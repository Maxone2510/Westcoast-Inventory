<title>Westcoast Vegetables Ltd. – Inventory Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--g:#2d6a2f;--gm:#3d8b3f;--gl:#5aab5c;--gb:#f0f7f0;--y:#e8c53a;--yd:#c9a820;--dk:#1a2018;--mid:#374035;--gr:#6b7a69;--bd:#d4e0d2;--bg:#f7faf6;--w:#ffffff;--r:#c0392b;--rb:#fdf0ee;--am:#d47c0a;--ab:#fdf8ee;}
body{background:var(--bg);font-family:'Source Sans 3',sans-serif;}
.app{min-height:100vh;background:var(--bg);color:var(--dk);}
.hdr{background:linear-gradient(135deg,#1a2018,#2d3d2b);padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:58px;border-bottom:3px solid var(--y);position:sticky;top:0;z-index:100;box-shadow:0 2px 14px rgba(0,0,0,0.3);gap:8px;flex-wrap:wrap;}
.logo{font-size:17px;}
.lco{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#fff;}
.lsu{font-size:9px;color:var(--y);font-weight:600;letter-spacing:1.1px;text-transform:uppercase;}
.nav{display:flex;gap:1px;flex-wrap:wrap;}
.nb{background:none;border:none;color:rgba(255,255,255,0.5);font-family:'Source Sans 3',sans-serif;font-size:11px;font-weight:600;padding:6px 9px;border-radius:5px;cursor:pointer;transition:all 0.15s;}
.nb:hover{background:rgba(255,255,255,0.08);color:#fff;}
.nb.act{background:var(--g);color:#fff;}
.ha{display:flex;gap:5px;}
.btn{border:none;border-radius:6px;padding:6px 12px;font-family:'Source Sans 3',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:4px;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.bg2{background:var(--g);color:#fff;}
.bg2:hover:not(:disabled){background:var(--gm);}
.bgh{background:rgba(45,106,47,0.08);color:var(--g);border:1px solid var(--bd);}
.bgh:hover{background:rgba(45,106,47,0.15);}
.bdr{background:var(--rb);color:var(--r);border:1px solid rgba(192,57,43,0.2);}
.bdr:hover:not(:disabled){background:rgba(192,57,43,0.15);}
.byw{background:var(--y);color:var(--dk);}
.byw:hover{background:var(--yd);}
.bmg{background:rgba(201,168,32,0.12);color:var(--yd);border:1px solid rgba(201,168,32,0.25);}
.bmg:hover{background:rgba(201,168,32,0.22);}
.bs{padding:4px 8px;font-size:10px;}
.cnt{padding:16px 18px;max-width:1440px;margin:0 auto;}
.sb{background:linear-gradient(135deg,#1a2018,#2d3d2b);border-radius:10px;padding:11px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:11px;border:1px solid rgba(232,197,58,0.3);flex-wrap:wrap;}
.st{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--y);}
.sd{font-size:10px;color:rgba(255,255,255,0.5);margin-top:1px;}
.spb{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin-top:4px;}
.spf{height:100%;background:linear-gradient(90deg,#5aab5c,#e8c53a);border-radius:2px;}
.sp{font-size:9px;color:rgba(255,255,255,0.4);margin-top:2px;}
.sv{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff;}
.sl{font-size:9px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.6px;}
.als{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.ar{border-radius:7px;padding:8px 12px;display:flex;align-items:flex-start;gap:8px;}
.ao{background:var(--rb);border:1px solid rgba(192,57,43,0.25);}
.al{background:var(--ab);border:1px solid rgba(212,124,10,0.25);}
.at{font-weight:700;font-size:11px;margin-bottom:3px;}
.ao .at{color:var(--r);}
.al .at{color:var(--am);}
.cps{display:flex;flex-wrap:wrap;gap:4px;}
.cp{font-size:10px;font-weight:600;padding:1px 6px;border-radius:3px;border:1px solid transparent;}
.cr{background:rgba(192,57,43,0.1);color:var(--r);border-color:rgba(192,57,43,0.2);}
.ca{background:rgba(212,124,10,0.1);color:var(--am);border-color:rgba(212,124,10,0.2);}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px;}
@media(max-width:600px){.sg{grid-template-columns:repeat(2,1fr);}}
.sc{background:var(--w);border:1px solid var(--bd);border-radius:9px;padding:13px 15px;border-top:3px solid var(--g);}
.sc.r{border-top-color:var(--r);}
.sc.a{border-top-color:var(--am);}
.sc.y{border-top-color:var(--yd);}
.sl2{font-size:9px;color:var(--gr);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:3px;}
.sv2{font-family:'Playfair Display',serif;font-size:25px;font-weight:700;color:var(--dk);}
.ss{font-size:9px;color:#aab5aa;margin-top:1px;}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;gap:7px;flex-wrap:wrap;}
.st2{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--dk);}
.fr{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.sw{position:relative;}
.sw svg{position:absolute;left:7px;top:50%;transform:translateY(-50%);opacity:0.4;pointer-events:none;}
.si{background:var(--w);border:1px solid var(--bd);border-radius:6px;padding:6px 9px 6px 26px;font-family:'Source Sans 3',sans-serif;font-size:11px;color:var(--dk);outline:none;min-width:180px;transition:border-color 0.15s;}
.si:focus{border-color:var(--g);}
.si::placeholder{color:#b0bdb0;}
select.fi{background:var(--w);border:1px solid var(--bd);border-radius:6px;padding:6px 9px;font-family:'Source Sans 3',sans-serif;font-size:10px;color:var(--mid);outline:none;cursor:pointer;}
.tw{background:var(--w);border:1px solid var(--bd);border-radius:9px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:860px;}
thead th{background:var(--dk);color:rgba(255,255,255,0.65);font-size:11px;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;padding:10px 12px;text-align:left;}
tbody tr{border-bottom:1px solid var(--bd);transition:background 0.1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#f9fbf9;}
tbody tr.lr{background:var(--ab);}
tbody tr.or{background:var(--rb);}
td{padding:11px 12px;font-size:13px;vertical-align:middle;}
.in{font-weight:700;color:var(--dk);font-size:14px;}
.ia{font-size:12px;color:var(--gr);margin-top:2px;font-style:italic;}
.ip{font-size:10px;color:#bbb;margin-top:2px;}
.sb2{display:inline-block;font-size:11px;font-weight:600;padding:2px 7px;border-radius:3px;background:var(--gb);color:var(--g);border:1px solid var(--bd);}
.cb{display:inline-block;font-size:11px;padding:2px 7px;border-radius:3px;background:rgba(45,106,47,0.07);color:var(--gr);}
.sp2{display:flex;flex-direction:column;gap:1px;}
.sp3{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;}
.sp4{font-size:11px;color:var(--g);font-weight:600;}
.sp5{font-size:10px;color:var(--gr);}
.sok{color:var(--g);}
.slo{color:var(--am);}
.sou{color:var(--r);}
.pi{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;border-radius:3px;letter-spacing:0.4px;}
.po{background:rgba(45,106,47,0.1);color:var(--g);}
.pl{background:rgba(212,124,10,0.1);color:var(--am);}
.px{background:rgba(192,57,43,0.1);color:var(--r);}
.bw{width:44px;height:3px;background:var(--bd);border-radius:1px;margin-top:3px;}
.bf{height:100%;border-radius:1px;}
.ra{display:flex;gap:3px;justify-content:flex-end;flex-wrap:wrap;}
.mb{background:linear-gradient(135deg,#c9a820,#e8c53a);padding:7px 18px;display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:700;color:var(--dk);}
.hl{display:flex;flex-direction:column;gap:4px;}
.hi{background:var(--w);border:1px solid var(--bd);border-radius:7px;padding:8px 12px;display:flex;align-items:center;gap:10px;border-left:3px solid transparent;}
.hi.received{border-left-color:var(--g);}
.hi.used{border-left-color:var(--am);}
.hi.correction{border-left-color:#9b59b6;}
.hb{font-size:9px;font-weight:700;letter-spacing:0.4px;padding:2px 6px;border-radius:3px;text-transform:uppercase;flex-shrink:0;}
.hbr{background:rgba(45,106,47,0.1);color:var(--g);}
.hbu{background:rgba(212,124,10,0.1);color:var(--am);}
.hbc{background:rgba(155,89,182,0.1);color:#9b59b6;}
.hi2{flex:1;}
.hn{font-weight:600;font-size:11px;}
.ht{font-size:9px;color:var(--gr);margin-top:1px;}
.hr{text-align:right;flex-shrink:0;}
.hq{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;}
.hd{font-size:9px;color:#aaa;margin-top:1px;}
.gc{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
@media(max-width:700px){.gc{grid-template-columns:repeat(2,1fr);}}
.gcd{background:var(--w);border:1px solid var(--bd);border-radius:7px;padding:10px 12px;}
.gn{font-weight:600;font-size:11px;color:var(--dk);}
.ga{font-size:9px;color:var(--gr);font-style:italic;margin-top:1px;}
.gs{display:flex;gap:10px;margin-top:6px;}
.gv{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;}
.gl2{font-size:9px;color:var(--gr);text-transform:uppercase;letter-spacing:0.4px;}
.bs2{background:var(--w);border:1px solid var(--bd);border-radius:9px;padding:18px;margin-bottom:16px;}
.bd2{border:2px dashed var(--bd);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all 0.15s;background:var(--gb);}
.bd2:hover,.bd2.dg{border-color:var(--g);background:#e4f0e4;}
.br{background:var(--gb);border:1px solid var(--bd);border-radius:8px;padding:12px;margin-top:12px;}
.brow{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--bd);}
.brow:last-child{border-bottom:none;}
.bmn{font-weight:600;font-size:11px;}
.bok{font-size:9px;color:var(--g);margin-top:1px;}
.bno{font-size:9px;color:var(--am);margin-top:1px;}
.bq{width:65px;background:var(--w);border:1px solid var(--bd);border-radius:5px;padding:4px 6px;font-family:'Source Sans 3',sans-serif;font-size:11px;color:var(--dk);outline:none;}
.bq:focus{border-color:var(--g);}
.ov{position:fixed;inset:0;background:rgba(26,32,24,0.6);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);padding:14px;}
.mo{background:var(--w);border-radius:12px;padding:20px;width:420px;max-width:100%;max-height:90vh;overflow-y:auto;border-top:4px solid var(--g);box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.mo.pm{width:300px;border-top-color:var(--yd);text-align:center;}
.mt{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--dk);margin-bottom:13px;}
.mp{background:var(--gb);border:1px solid var(--bd);border-radius:7px;padding:8px 11px;margin-bottom:11px;font-size:11px;}
.mp strong{color:var(--dk);font-size:12px;}
.md{color:var(--g);font-size:10px;margin-top:2px;font-weight:600;}
.fl{margin-bottom:10px;}
.fl label{display:block;font-size:9px;font-weight:700;color:var(--gr);margin-bottom:3px;letter-spacing:0.4px;text-transform:uppercase;}
.fl input,.fl select{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:7px 9px;font-family:'Source Sans 3',sans-serif;font-size:11px;color:var(--dk);outline:none;transition:border-color 0.15s;}
.fl input:focus,.fl select:focus{border-color:var(--g);background:#fff;}
.fh{font-size:9px;color:var(--g);margin-top:2px;font-weight:600;}
.ma{display:flex;gap:6px;margin-top:14px;justify-content:flex-end;}
.pd{display:flex;gap:9px;justify-content:center;margin:14px 0;}
.pdot{width:13px;height:13px;border-radius:50%;border:2px solid var(--bd);transition:all 0.15s;}
.pdot.f{background:var(--yd);border-color:var(--yd);}
.pp{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px;}
.pk{background:var(--bg);border:1px solid var(--bd);border-radius:7px;padding:11px;font-size:17px;font-weight:700;cursor:pointer;transition:all 0.15s;font-family:'Playfair Display',serif;}
.pk:hover{background:var(--gb);border-color:var(--g);}
.pk.dl{font-size:13px;color:var(--r);}
.toast{position:fixed;bottom:18px;right:18px;padding:8px 14px;border-radius:7px;font-size:11px;font-weight:600;z-index:999;box-shadow:0 4px 18px rgba(0,0,0,0.15);animation:su 0.3s ease;}
.ts{background:var(--g);color:#fff;}
.te{background:var(--r);color:#fff;}
.tw2{background:var(--am);color:#fff;}
@keyframes su{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.em{text-align:center;padding:40px 20px;color:var(--gr);}
.ls{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:11px;background:var(--bg);}
.lb{width:150px;height:4px;background:var(--bd);border-radius:2px;overflow:hidden;}
.lf{height:100%;background:linear-gradient(90deg,var(--g),var(--y));border-radius:2px;animation:la 1.5s ease-in-out infinite;}
@keyframes la{0%{transform:translateX(-100%)}100%{transform:translateX(250%)}}

/* ── PRINT STYLES ── */
@media print {
  .no-print{display:none!important;}
  .app{display:none!important;}
  #cs{display:block!important;}
  body{background:white;}
}
#cs{display:none;}

#splash{position:fixed;inset:0;background:linear-gradient(135deg,#1a2018,#2d3d2b);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.6s ease;}
#splash.hide{opacity:0;pointer-events:none;}
#splash-logo{width:320px;height:210px;object-fit:contain;border-radius:16px;animation:splashPulse 1.5s ease-in-out infinite;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.4));}
#splash-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:#fff;margin-top:20px;text-align:center;}
#splash-sub{font-size:11px;color:#e8c53a;letter-spacing:2px;text-transform:uppercase;margin-top:6px;}
#splash-bar{width:140px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin-top:20px;}
#splash-fill{height:100%;background:linear-gradient(90deg,#4aab4c,#e8c53a);border-radius:2px;animation:splashLoad 1.8s ease-in-out forwards;}
@keyframes splashPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05);}}
@keyframes splashLoad{0%{width:0%}60%{width:75%}100%{width:100%}}
</style>
</head>

function disp(name,stock){
  if(!stock&&stock!==0)return{p:'0',s:null,t:null};
  const c=PS[name];
  if(!c)return{p:stock.toLocaleString(),s:null,t:null};
  if(c.mode==='box_total'){
    const pal=Math.floor(stock/c.per),rem=stock%c.per;
    return{p:stock.toLocaleString()+' boxes',s:rem>0?`≈${pal} pallets + ${rem} boxes`:`${pal} pallets`,t:null};
  }
  if(c.mode==='pallet'){
    return{p:stock.toLocaleString()+' pallets',s:`${(stock*c.per).toLocaleString()} ${c.su}`,t:null};
  }
  if(c.mode==='box_bag'){
    return{p:stock.toLocaleString()+' boxes',s:`${(stock*c.per).toLocaleString()} bags`,t:null};
  }
  if(c.mode==='roll_bag'){
    return{p:stock.toLocaleString()+' rolls',s:`${(stock*c.per).toLocaleString()} bags`,t:null};
  }
  if(c.mode==='label'){
    const cs=Math.floor(stock/c.rpc),rem=stock%c.rpc;
    const cstr=rem>0?`${cs} cases + ${rem} rolls`:`${cs} cases`;
    return{p:stock+' rolls',s:cstr,t:((stock*c.lpl).toLocaleString())+' labels'};
  }
  return{p:stock.toLocaleString(),s:null,t:null};
}

function extractBolNum(note){
  if(!note)return null;
  const m=note.match(/BOL\s*#?\s*(\w+)/i);
  return m?m[1].toUpperCase():null;
}

function DupWarning({note,hist,onOverride}){
  const bolNum=extractBolNum(note);
  if(!bolNum||bolNum.length<3)return null;
  const existing=hist.filter(h=>{
    const n=extractBolNum(h.note);
    return n&&n===bolNum;
  });
  if(!existing.length)return null;
  const first=existing[0];
  return(
    <div style={{background:"#fff8e1",border:"2px solid #e8c53a",borderRadius:7,padding:"9px 12px",marginBottom:10}}>
      <div style={{fontWeight:700,fontSize:11,color:"#c9a820",marginBottom:4}}>⚠️ Duplicate BOL Warning</div>
      <div style={{fontSize:10,color:"#6b7a69"}}>BOL <strong>#{bolNum}</strong> was already entered on <strong>{fmt(first.date)}</strong> by <strong>{first.username}</strong>.</div>
      <div style={{fontSize:10,color:"#6b7a69",marginTop:2}}>You can still save if this is intentional (e.g. amended BOL).</div>
    </div>
  );
}

      if(Array.isArray(r)&&r[0])setItems(p=>[...p,r[0]]);
      toast_(`✅ ${form.name} added`);closeM();
    }catch{toast_("Save failed","error");}

  const doMBol=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setMf(file);setMfn(file.name);setMa2(true);setMar(null);
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      let c=[];
      if(file.type.startsWith("image/"))c=[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:`Analyze this document — it may be a BOL, invoice, packing slip, or delivery receipt. Extract whatever receiving info is available. Return ONLY valid JSON: {"items":[{"name":"...","qty":0,"unit":"..."}],"bolNumber":"...","invoiceNumber":"...","date":"...","supplier":"..."}`}];
      else if(file.type==="application/pdf")c=[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:`Analyze this document — it may be a BOL, invoice, packing slip, or delivery receipt. Extract whatever receiving info is available. Return ONLY valid JSON: {"items":[{"name":"...","qty":0,"unit":"..."}],"bolNumber":"...","invoiceNumber":"...","date":"...","supplier":"..."}`}];
      if(c.length){
        const rsp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:c}]})});
        const data=await rsp.json();
        const text=data.content?.map(b=>b.text||"").join("")||"";
        try{const p=JSON.parse(text.replace(/```json|```/g,"").trim());setMar(p);if(p.bolNumber)setForm(f=>({...f,note:`BOL #${p.bolNumber}`}));}
        catch{setMar({error:"Could not parse."});}
      }
    }catch{setMar({error:"Analysis failed."});}
    setMa2(false);
  };

  const procBol=async(file)=>{
    if(!file)return;setBfn(file.name);setBp(true);setBr(null);setBq({});
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      let c=[];
      const prompt=`Analyze this document for Westcoast Vegetables Ltd. in Delta BC. It may be a BOL, invoice, packing slip, or delivery receipt — process it regardless of format.
Extract ALL items. Product codes 28580001=WS 11LB, 14160085=Tall Generic, 14160066=Maestro are key.
Return ONLY valid JSON: {"bolNumber":"...","date":"...","supplier":"...","items":[{"name":"...","qty":0,"unit":"...","productCode":"..."}]}`;
      if(file.type.startsWith("image/"))c=[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:prompt}];
      else if(file.type==="application/pdf")c=[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:prompt}];
      if(c.length){
        const rsp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages:[{role:"user",content:c}]})});
        const data=await rsp.json();
        const text=data.content?.map(b=>b.text||"").join("")||"";
        try{
          const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
          const matched=parsed.items.map(bi=>{
            const nl=bi.name.toLowerCase(),pc=(bi.productCode||"").toLowerCase();
            const found=items.find(i=>{
              const nm=i.name.toLowerCase(),al=(i.alt||"").toLowerCase();
              return nm.includes(nl.substring(0,7))||nl.includes(nm.substring(0,7))||al.includes(nl.substring(0,6))||nl.includes(al.substring(0,6))||(pc&&al.includes(pc));
            });
            return{...bi,matched:found||null};
          });
          setBr({...parsed,items:matched});
          const iq={};matched.forEach((it,idx)=>{iq[idx]=it.qty;});setBq(iq);
          if(parsed.bolNumber)setBn(`BOL #${parsed.bolNumber}`);
        }catch{setBr({error:"Could not read BOL."});}
      }else setBr({error:"Unsupported file type."});
    }catch{setBr({error:"Analysis failed."});}
    setBp(false);
  };

  const saveBol=async()=>{
    if(!bu){toast_("Please enter your name","error");return;}
    if(!br?.items)return;
    setSaving(true);
    const today=new Date().toISOString().split("T")[0];

        const ns=bi.matched.stock+qty;

        setItems(p=>p.map(i=>i.id===bi.matched.id?{...i,stock:ns}:i));
        setHist(p=>[{id:Date.now()+idx,item_id:bi.matched.id,type:"received",qty,date:today,note:bn||`BOL: ${bfn}`,username:bu},...p]);

        {tab==="inventory"&&<>

            <div className="fr">

            <div className="fl">
              <label>Date on BOL * (actual delivery date)</label>
              <input type="date" value={prForm.date} onChange={e=>setPrForm(f=>({...f,date:e.target.value}))}/>
              <div className="fh">Enter the date from the Crown BOL, not today's date</div>
            </div>
            <DupWarning note={prForm.note} hist={hist}/>
            <div className="ma">
              <button className="btn bgh" onClick={()=>{setPrModal(null);setPrForm({boxes:"",note:"",date:"",bolFile:null,bolName:""});}}>Cancel</button>
              <button className="btn bg2" disabled={!prForm.boxes||!prForm.date||saving} onClick={async()=>{
                if(!prForm.boxes||!prForm.date)return;
                setSaving(true);
                const qty=parseInt(prForm.boxes);
                const txDate=prForm.date;
                const newTx={item_id:prModal.invItem.id,type:"prerun_recv",qty,date:txDate,note:prForm.note||`Pre-run delivery`,username:"MGR:Manager"};
                try{
                  const res=await api("transactions",{method:"POST",body:JSON.stringify(newTx),prefer:"return=representation"});
                  const savedTx=Array.isArray(res)&&res[0]?res[0]:{...newTx,id:Date.now()};
                  setHist(p=>[savedTx,...p]);
                  toast_(`✅ ${qty.toLocaleString()} boxes added to pre-run storage`);
                  setPrModal(null);
                  setPrForm({boxes:"",note:"",date:"",bolFile:null,bolName:""});
                }catch{toast_("Save failed","error");}
                setSaving(false);
              }}>{saving?"Saving…":"✅ Add to Pre-Run Storage"}</button>
            </div>
          </>}

          {prModal.type==="pull"&&<>
            <div className="mt">📤 Log Pull from Pre-Run</div>
            <div className="mp">
              <strong>{prModal.item.icon} {prModal.item.name}</strong>
              <div style={{color:"var(--gr)",fontSize:9,marginTop:1}}>Moves boxes from Pre-Run Storage → Active Inventory</div>
              {(()=>{
                const prRecvH=hist.filter(h=>h.item_id===prModal.invItem?.id&&h.type==="prerun_recv");
                const prPullH=hist.filter(h=>h.item_id===prModal.invItem?.id&&h.type==="prerun_pull");
                const rem=prRecvH.reduce((s,h)=>s+h.qty,0)-prPullH.reduce((s,h)=>s+h.qty,0);
                return <div className="md">Available in pre-run: {rem.toLocaleString()} boxes</div>;
              })()}
            </div>
            <div style={{background:"rgba(201,168,32,0.08)",border:"1px solid rgba(201,168,32,0.25)",borderRadius:6,padding:"8px 11px",fontSize:10,color:"var(--yd)",marginBottom:11}}>
              ⚠️ This will move boxes from Pre-Run Storage into Active Inventory and log a receipt. Crown will send you a BOL for this pull.
            </div>
            <div className="fl">
              <label>Upload Pull BOL (optional)</label>
              {!prForm.bolFile
                ?<div className="bd2" style={{padding:10}} onClick={()=>prBolRef.current.click()}>
                  <input ref={prBolRef} type="file" accept="image/*,.pdf" style={{display:"none"}} onChange={async(e)=>{
                    const file=e.target.files[0];if(!file)return;
                    setPrForm(f=>({...f,bolFile:file,bolName:file.name}));
                    setPrAnalyzing(true);
                    try{
                      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
                      let c=[];
                      const prompt=`This is a Crown Packaging pull BOL for ${prModal.item.name}. Extract total boxes pulled and BOL number. Return ONLY JSON: {"bolNumber":"...","totalBoxes":0}`;
                      if(file.type.startsWith("image/"))c=[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:prompt}];
                      else if(file.type==="application/pdf")c=[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:prompt}];
                      if(c.length){
                        const rsp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,messages:[{role:"user",content:c}]})});
                        const data=await rsp.json();
                        const text=data.content?.map(b=>b.text||"").join("")||"";
                        try{
                          const p=JSON.parse(text.replace(/```json|```/g,"").trim());
                          setPrForm(f=>({...f,boxes:p.totalBoxes||"",note:`Pull BOL #${p.bolNumber||""}`,bolFile:file,bolName:file.name}));
                        }catch{}
                      }
                    }catch{}
                    setPrAnalyzing(false);
                  }}/>
                  <div style={{fontSize:16,marginBottom:2}}>📄</div>
                  <div style={{color:"var(--g)",fontWeight:700,fontSize:11}}>Upload Pull BOL</div>
                </div>
                :<div style={{background:"rgba(45,106,47,0.07)",border:"1px solid rgba(45,106,47,0.2)",borderRadius:6,padding:"7px 10px",display:"flex",alignItems:"center",gap:6,fontSize:10,color:"var(--g)"}}>
                  <span>✅</span>
                  <div style={{flex:1}}><div style={{fontWeight:600}}>{prForm.bolName}</div>{prAnalyzing&&<div style={{color:"var(--am)",fontSize:9}}>🤖 Reading BOL…</div>}</div>
                  <button className="btn bgh bs" onClick={()=>setPrForm(f=>({...f,bolFile:null,bolName:""}))}>✕</button>
                </div>}
            </div>
            <div className="fl">
              <label>Total Boxes to Pull *</label>
              <input type="number" min="1" placeholder="e.g. 8250 (= 20×400 + 250)" value={prForm.boxes} onChange={e=>setPrForm(f=>({...f,boxes:e.target.value}))}/>
              {prForm.boxes&&parseInt(prForm.boxes)>0&&<div className="fh">≈ {Math.floor(parseInt(prForm.boxes)/400)} full pallets + {parseInt(prForm.boxes)%400} boxes → moves to active inventory</div>}
            </div>
            <div className="fl">
              <label>BOL / Pull Reference</label>
              <input type="text" placeholder="e.g. Pull BOL #1189909" value={prForm.note} onChange={e=>setPrForm(f=>({...f,note:e.target.value}))}/>
            </div>
            <div className="fl">
              <label>Date on Pull BOL * (actual pull date)</label>
              <input type="date" value={prForm.date} onChange={e=>setPrForm(f=>({...f,date:e.target.value}))}/>
              <div className="fh">Enter the date from Crown's pull BOL</div>
            </div>
            <DupWarning note={prForm.note} hist={hist}/>
            <div className="ma">
              <button className="btn bgh" onClick={()=>{setPrModal(null);setPrForm({boxes:"",note:"",date:"",bolFile:null,bolName:""});}}>Cancel</button>
              <button className="btn byw" disabled={!prForm.boxes||!prForm.date||saving} onClick={async()=>{
                if(!prForm.boxes||!prForm.date||!prModal.invItem)return;
                setSaving(true);
                const qty=parseInt(prForm.boxes);
                const today=prForm.date;
                // Convert boxes to pallets for active inventory (item is stored in pallets)
                const ps=PS[prModal.invItem.name];
                const palletQty=Math.round(qty/(ps?.per||400));
                try{
                  // Log pre-run pull transaction
                  const pullRes=await api("transactions",{method:"POST",body:JSON.stringify({item_id:prModal.invItem.id,type:"prerun_pull",qty,date:today,note:prForm.note||`Pre-run pull`,username:"MGR:Manager"}),prefer:"return=representation"});
                  // Add to active inventory as received (in pallets)
                  const ns=prModal.invItem.stock+palletQty;
                  await api(`items?id=eq.${prModal.invItem.id}`,{method:"PATCH",body:JSON.stringify({stock:ns}),prefer:"return=minimal"});
                  const recvRes=await api("transactions",{method:"POST",body:JSON.stringify({item_id:prModal.invItem.id,type:"received",qty:palletQty,date:today,note:`Pre-run pull: ${qty.toLocaleString()} boxes (${prForm.note||""})`,username:"MGR:Manager"}),prefer:"return=representation"});
                  const pullTx=Array.isArray(pullRes)&&pullRes[0]?pullRes[0]:{id:Date.now(),item_id:prModal.invItem.id,type:"prerun_pull",qty,date:today,note:prForm.note||`Pre-run pull`,username:"MGR:Manager"};
                  const recvTx=Array.isArray(recvRes)&&recvRes[0]?recvRes[0]:{id:Date.now()+1,item_id:prModal.invItem.id,type:"received",qty:palletQty,date:today,note:`Pre-run pull: ${qty.toLocaleString()} boxes (${prForm.note||""})`,username:"MGR:Manager"};
                  setItems(p=>p.map(i=>i.id===prModal.invItem.id?{...i,stock:ns}:i));
                  setHist(p=>[pullTx,recvTx,...p]);
                  toast_(`✅ ${qty.toLocaleString()} boxes pulled → ${palletQty} pallets added to active inventory`);
                  setPrModal(null);
                  setPrForm({boxes:"",note:"",date:"",bolFile:null,bolName:""});
                }catch{toast_("Save failed","error");}
                setSaving(false);
              }}>{saving?"Saving…":"✅ Confirm Pull"}</button>
            </div>
          </>}
        </div>
      </div>}

      {/* PIN MODAL */}
      {spm&&<div className="ov" onClick={e=>e.target===e.currentTarget&&setSpm(false)}>
        <div className="mo pm">
          <div style={{fontSize:30,marginBottom:7}}>🔐</div>
          <div className="mt" style={{textAlign:"center"}}>Manager Access</div>
          <div style={{fontSize:10,color:"var(--gr)",marginBottom:7}}>Enter your 4-digit PIN</div>
          <div className="pd">
            {[0,1,2,3].map(i=><div key={i} className={`pdot${pi.length>i?" f":""}`} style={pe?{borderColor:"var(--r)",background:"var(--r)"}:{}}></div>)}
          </div>
          {pe&&<div style={{fontSize:10,color:"var(--r)",marginBottom:6}}>Incorrect PIN</div>}
          <div className="pp">
            {['1','2','3','4','5','6','7','8','9','','0','del'].map((k,i)=>(
              k===''?<div key={i}></div>:
              <button key={i} className={`pk${k==='del'?" dl":""}`} onClick={()=>hPinKey(k)}>{k==='del'?'⌫':k}</button>
            ))}
          </div>
          <div style={{marginTop:12}}><button className="btn bgh" style={{width:"100%"}} onClick={()=>setSpm(false)}>Cancel</button></div>
        </div>
      </div>}

      {/* CHANGE PIN MODAL */}
      {scpm&&<div className="ov" onClick={e=>e.target===e.currentTarget&&setScpm(false)}>
        <div className="mo pm">
          <div style={{fontSize:30,marginBottom:7}}>🔑</div>
          <div className="mt" style={{textAlign:"center"}}>Set New PIN</div>
          <div style={{fontSize:10,color:"var(--gr)",marginBottom:7}}>Enter your new 4-digit PIN</div>
          <div className="pd">
            {[0,1,2,3].map(i=><div key={i} className={`pdot${np.length>i?" f":""}`}></div>)}
          </div>
          <div className="pp">
            {['1','2','3','4','5','6','7','8','9','','0','del'].map((k,i)=>(
              k===''?<div key={i}></div>:
              <button key={i} className={`pk${k==='del'?" dl":""}`} onClick={()=>hPinKey(k,true)}>{k==='del'?'⌫':k}</button>
            ))}
          </div>
          <div style={{marginTop:12}}><button className="btn bgh" style={{width:"100%"}} onClick={()=>setScpm(false)}>Cancel</button></div>
        </div>
      </div>}

      {toast&&<div className={`toast t${toast.type==="success"?"s":toast.type==="error"?"e":"w2"}`}>{toast.msg}</div>}
      <div style={{textAlign:"center",padding:"18px 0 10px",fontSize:"9px",color:"rgba(255,255,255,0.08)",fontFamily:"'Source Sans 3',sans-serif",letterSpacing:"1.5px",userSelect:"none"}}>
        v1.21 · © 2025–2026 · Max-One
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
