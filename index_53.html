    const u=item.unit||'units';

    const showSub=conv>1&&cu&&cu!==u;
    if(showSub)return{main:`${s.toLocaleString()} ${u}`,sub:`${(s*conv).toLocaleString()} ${cu}s`};
    return{main:`${s.toLocaleString()} ${u}`,sub:''};

  const procBol=async(file)=>{
    if(!file)return;
    setBolName(file.name);setBolLoading(true);setBolResult(null);setBolQty({});
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
      let c=[];
      const prompt=`Analyze this document for Westcoast Vegetables Ltd. in Delta BC. It may be a BOL, invoice, packing slip, or delivery receipt.

QUANTITY: Use SHIPPED qty (not ordered). Ignore PLT pallet lines.
UNITS: BX15=boxes, RL=rolls, CS=cases, BOX=boxes
PRICE: If price is per KG, multiply by kg/unit to get price per box. Verify: extension / shipped qty = unit price per box.
PRODUCTS: 9000B-PAS-15=Hotmelt Glue(103.20/box,15kg), 28580001=Windset 11lb, 14160085=60x40 DEEPGENERIC, 14160066=2 Layer Revised COSTCO, MSC096080=Pallet Wrap, 27300181=Pallet Wrap

Return ONLY valid JSON: {"bolNumber":"...","date":"...","supplier":"...","items":[{"name":"...","qty":0,"unit":"boxes","unitPrice":0,"productCode":"..."}]}`;
      if(file.type.startsWith('image/'))c=[{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:prompt}];
      else if(file.type==='application/pdf')c=[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:prompt}];
      if(c.length){
        const rsp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:c}]})});
        const data=await rsp.json();
        const text=(data.content||[]).map(b=>b.text||'').join('');
        try{
          const p=JSON.parse(text.replace(/```json|```/g,'').trim());
          const matched=p.items.map(bi=>{
            const nl=bi.name.toLowerCase(),pc=(bi.productCode||'').toLowerCase();
            const found=items.find(i=>{
              const nm=i.name.toLowerCase(),al=(i.alt||'').toLowerCase();
              return nm.includes(nl.substring(0,7))||nl.includes(nm.substring(0,7))||al.includes(nl.substring(0,6))||(pc&&(al.includes(pc)||nm.includes(pc)));
            });
            return{...bi,matched:found||null};
          });
          setBolResult({...p,items:matched});
          const iq={};matched.forEach((it,idx)=>{iq[idx]=it.qty;});setBolQty(iq);
        }catch{setBolResult({error:'Could not parse response.'});}
      }
    }catch{setBolResult({error:'Analysis failed.'});}
    setBolLoading(false);
  };

    h+=`<div class="title"><h1>🌿 Westcoast Vegetables Ltd.</h1><h2>Inventory Count Sheet</h2></div>`;

        const exp=pinTarget==='director'?PIN_DIR:PIN_MGR;

      }
    }
  };

        <div className="roles">

            <div className="rc-icon">📊</div><h3>Director</h3><p>Stock values · Invoice log · Price reports</p>
          </div>
          <div className="role-card mgr" onClick={()=>openPin('manager')}>
            <div className="rc-icon">🏭</div><h3>Manager</h3><p>Inventory · BOL · Pre-Run · Orders</p>
          </div>
          <div className="role-card" onClick={()=>{setRole('supervisor');loadData();}}>

  if(role==='director'){
    return(
      <div style={{background:'var(--dk)',minHeight:'100vh',color:'#fff'}}>
        <div className="hdr">
          <div><div className="lco">Westcoast Vegetables Ltd.</div><div className="lsu">Director Dashboard</div></div>
          <div className="nav">
            <button className={`nb${dirTab==='stock'?' act':''}`} onClick={()=>setDirTab('stock')}>Stock Value</button>
            <button className={`nb${dirTab==='invoices'?' act':''}`} onClick={()=>setDirTab('invoices')}>Invoice Log</button>
            <button className={`nb${dirTab==='prerun'?' act':''}`} onClick={()=>setDirTab('prerun')}>Pre-Run</button>
            <button className={`nb${dirTab==='settings'?' act':''}`} onClick={()=>setDirTab('settings')}>Settings</button>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={()=>{setRole('landing');setDirTab('stock');}}>← Exit</button>
        </div>
        <div className="dir-dash">
          {dirTab==='stock'&&(
            <>
              <div className="dash-cards" style={{marginBottom:20}}>
                {[
                  ['Total Stock Value',`CA$${dirTotal.toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2})}`,'Priced items only'],
                  ['Items Tracked',items.length,`${items.filter(i=>(dirCosts[i.id]||0)>0).length} priced`],
                  ['Latest Invoice','Apr 20, 2026','Technical Adhesives #18816'],
                  ['Out of Stock',outItems.length,`${lowItems.length} low stock`],
                ].map(([l,v,s])=>(
                  <div key={l} className="dc" style={{background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.1)'}}>
                    <div className="dc-lbl" style={{color:'rgba(255,255,255,0.4)'}}>{l}</div>
                    <div className="dc-val" style={{color:'var(--y)',fontSize:22}}>{v}</div>
                    <div className="dc-sub" style={{color:'rgba(255,255,255,0.3)'}}>{s}</div>
                  </div>
                ))}
              </div>
              <div className="dir-sec">
                <h2>Current Stock Value</h2>
                <table className="dir-tbl">
                  <thead><tr><th>Item</th><th>Supplier</th><th style={{textAlign:'right'}}>Qty</th><th style={{textAlign:'right'}}>Cost/Unit</th><th style={{textAlign:'right'}}>Value</th><th style={{textAlign:'right'}}>Edit Price</th></tr></thead>
                  <tbody>
                    {items.map(item=>{
                      const cost=dirCosts[item.id]||0;
                      const val=(parseFloat(item.stock)||0)*cost;
                      return(
                        <tr key={item.id}>
                          <td><div style={{fontWeight:600}}>{item.name}</div>{item.alt&&<div style={{fontSize:11,color:'rgba(255,255,255,0.35)',fontStyle:'italic'}}>{item.alt}</div>}</td>
                          <td style={{fontSize:11,color:'rgba(255,255,255,0.4)'}}>{item.supplier}</td>
                          <td className="num">{(parseFloat(item.stock)||0).toLocaleString()} {item.unit}</td>
                          <td className="num" style={{color:'rgba(255,255,255,0.45)'}}>{cost>0?`$${cost.toFixed(2)}`:'—'}</td>
                          <td className="money">{val>0?`$${val.toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2})}`:'—'}</td>
                          <td className="num">
                            <input className="pinp" type="number" step="0.01" defaultValue={cost||''} placeholder="0.00" id={`pc-${item.id}`}/>
                            <button className="psave" onClick={()=>{const n=parseFloat(document.getElementById(`pc-${item.id}`).value);if(!isNaN(n)&&n>=0){setDirCosts(p=>({...p,[item.id]:n}));toast_('✓ Price updated');}}}>Save</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                  <tfoot><tr className="dir-total"><td colSpan={4}>Total Inventory Value</td><td className="money">CA${dirTotal.toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2})}</td><td></td></tr></tfoot>
                </table>
              </div>
            </>
          )}
          {dirTab==='invoices'&&(
            <div className="dir-sec">
              <h2>Invoice & Receive History</h2>
              {INVOICES.map(inv=>(
                <div className="inv-card" key={inv.id}>
                  <div className="inv-card-top">
                    <div><div className="inv-sup">{inv.supplier}</div><div className="inv-num">Invoice #{inv.inv_num} · Shipped {inv.ship_date}</div></div>
                    <div className="inv-badge">CA${inv.total.toLocaleString('en-CA',{minimumFractionDigits:2})}</div>
                  </div>
                  <div className="inv-grid">
                    <div className="inv-field"><strong>{inv.item}</strong>Item</div>
                    <div className="inv-field"><strong>{inv.qty} {inv.unit}</strong>Quantity</div>
                    <div className="inv-field"><strong>${inv.unit_price.toFixed(2)}/box (${inv.unit_price_kg}/kg)</strong>Unit Price</div>
                    <div className="inv-field"><strong>CA${inv.subtotal.toLocaleString('en-CA',{minimumFractionDigits:2})}</strong>Subtotal</div>
                    <div className="inv-field"><strong>CA${inv.gst.toFixed(2)}</strong>GST (5%)</div>
                    <div className="inv-field"><strong>{inv.pallets} pallets · {inv.shipper}</strong>Shipping</div>
                  </div>
                  <div className="inv-lots">Lots: {inv.lots.join(' · ')}</div>
                </div>
              ))}
            </div>
          )}
          {dirTab==='prerun'&&(
            <div className="dir-sec">
              <h2>Pre-Run Storage — View Only</h2>
              {PRERUN.map((pr,i)=>(
                <div key={i} style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.07)',borderRadius:10,padding:16,marginBottom:14}}>
                  <div style={{fontWeight:700,fontSize:15,color:'#fff',marginBottom:4}}>{pr.name}</div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,0.35)',marginBottom:12}}>{pr.sub}</div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:12}}>
                    {[['Pre-Run Storage',`${pr.storage.toLocaleString()} boxes`],['Pallets',`${pr.pf} full + ${pr.pr} boxes`],['Total Received',`${pr.recv.toLocaleString()} boxes`],['Total Pulled',`${pr.pulled} boxes`]].map(([l,v])=>(
                      <div key={l} style={{background:'rgba(255,255,255,0.04)',borderRadius:7,padding:10}}>
                        <div style={{fontSize:10,color:'rgba(255,255,255,0.35)',textTransform:'uppercase',marginBottom:4}}>{l}</div>
                        <div style={{fontSize:15,fontWeight:700,color:pr.storage===0?'rgba(255,255,255,0.3)':'var(--y)'}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  {pr.txs.length>0?pr.txs.map((tx,j)=>(
                    <div key={j} style={{display:'flex',justifyContent:'space-between',fontSize:12,padding:'5px 0',borderTop:'1px solid rgba(255,255,255,0.04)',color:'rgba(255,255,255,0.6)'}}>
                      <span><span style={{background:'rgba(45,106,79,0.2)',color:'#81c784',padding:'1px 6px',borderRadius:4,marginRight:8,fontSize:10}}>STORED</span>{tx.lot}</span>
                      <span>+{tx.qty.toLocaleString()} boxes · {tx.date}</span>
                    </div>
                  )):<div style={{fontSize:12,color:'rgba(255,255,255,0.25)',fontStyle:'italic'}}>No activity this season</div>}
                </div>
              ))}
            </div>
          )}
          {dirTab==='settings'&&(
            <div className="dir-sec">
              <h2>Change Director PIN</h2>
              <ChangePinForm current={PIN_DIR} onSave={np=>{localStorage.setItem('dir_pin',np);toast_('✓ PIN updated');}} dark/>
            </div>
          )}
        </div>
        {toast&&<div className={`toast${toast.err?' err':''}`}>{toast.msg}</div>}
      </div>
    );
  }

  return(
    <div>
      <div className="hdr">
        <div><div className="lco">Westcoast Vegetables Ltd.</div><div className="lsu">Inventory Tracker · A Growing Passion</div></div>
        <div className="nav">
          <button className={`nb${tab==='inventory'?' act':''}`} onClick={()=>setTab('inventory')}>Inventory</button>
          <button className={`nb${tab==='bol'?' act':''}`} onClick={()=>setTab('bol')}>📦 BOL</button>
          <button className={`nb${tab==='history'?' act':''}`} onClick={()=>setTab('history')}>History</button>
          <button className={`nb${tab==='reports'?' act':''}`} onClick={()=>setTab('reports')}>📊 Reports</button>
          <button className={`nb${tab==='dashboard'?' act':''}`} onClick={()=>setTab('dashboard')}>Dashboard</button>
          {role==='manager'&&<button className={`nb${tab==='prerun'?' act2':''}`} onClick={()=>setTab('prerun')}>🌿 Pre-Run</button>}
        </div>
        <div className="hdr-right">
          {(tab==='inventory'||tab==='reports')&&<input className="srch" placeholder="Search name, alt, supplier..." value={search} onChange={e=>setSearch(e.target.value)}/>}

        </div>

      <div className="season-bar">

          <div style={{textAlign:'center'}}><div style={{fontSize:18,fontWeight:700,color:'#fff'}}>{Math.round(unitsIn).toLocaleString()}</div><div style={{fontSize:10,color:'rgba(255,255,255,0.4)',textTransform:'uppercase'}}>Units In</div></div>
          <div style={{textAlign:'center'}}><div style={{fontSize:18,fontWeight:700,color:'#fff'}}>{Math.round(unitsUsed).toLocaleString()}</div><div style={{fontSize:10,color:'rgba(255,255,255,0.4)',textTransform:'uppercase'}}>Units Used</div></div>

        <div className="alerts">
          {outItems.length>0&&<><span className="alert-lbl">OUT OF STOCK —</span>{outItems.map(i=><span key={i.id} className="alert-out">{i.name}</span>)}</>}

      )}

        {loading&&<div className="empty">Loading inventory...</div>}

        {!loading&&tab==='inventory'&&(()=>{
          const grouped={};
          filtered.forEach(item=>{const s=item.supplier||'Other';if(!grouped[s])grouped[s]=[];grouped[s].push(item);});

            <>
              <div className="inv-hdr">
                <h2>Inventory Management {role==='manager'&&<span style={{fontSize:12,color:'var(--gr)',fontWeight:400}}>— Manager Mode</span>}{role==='supervisor'&&<span style={{fontSize:12,color:'var(--gr)',fontWeight:400}}>— Supervisor Mode</span>}</h2>
                <div className="filters">
                  <select className="fsel" value={catF} onChange={e=>setCatF(e.target.value)}>{cats.map(c=><option key={c}>{c}</option>)}</select>
                  <select className="fsel" value={supF} onChange={e=>setSupF(e.target.value)}>{sups.map(s=><option key={s}>{s}</option>)}</select>
                </div>
              </div>
              {orderedSups.map(sup=>(
                <div key={sup} style={{marginBottom:24}}>
                  <div className="sup-hdr"><span>{sup}</span><small>— {grouped[sup].length} item{grouped[sup].length!==1?'s':''}</small></div>
                  <table className="inv-tbl">

                    <tbody>
                      {grouped[sup].map(item=>{
                        const st=getStatus(item);const stk=fmtStock(item);
                        const lastIn=getLastTx(item.name,'in');const lastOut=getLastTx(item.name,'out');
                        const sUsed=txs.filter(t=>t.item_name===item.name&&t.type==='out').reduce((s,t)=>s+(t.qty||0),0);
                        return(
                          <tr key={item.id}>
                            <td><div className="iname">{item.name}</div>{item.alt&&<div className="ialt">↳ {item.alt}</div>}{item.conv>1&&<div className="iconv">{item.conv.toLocaleString()} {item.conv_unit}</div>}</td>

                            <td>{lastIn?<div className="lrx"><strong>{fmtDate(lastIn.created_at)}</strong>{lastIn.note}</div>:<span style={{color:'var(--gr)',fontSize:12}}>—</span>}</td>
                            <td>{lastOut?<div className="lrx"><strong>{fmtDate(lastOut.created_at)}</strong>{lastOut.note}</div>:<span style={{color:'var(--gr)',fontSize:12}}>—</span>}</td>
                            <td>{st==='out'?<span className="sout">OUT</span>:st==='low'?<span className="slow">LOW</span>:<span className="sok">OK</span>}</td>
                            <td><div className="act-btns">
                              <button className="btn btn-g btn-sm" onClick={()=>{setModal({type:'in',item});setForm({});}}>+ In</button>
                              <button className="btn btn-sm" style={{background:'var(--rb)',color:'var(--r)',border:'1px solid rgba(192,57,43,0.2)'}} onClick={()=>{setModal({type:'out',item});setForm({});}}>− Out</button>
                              {role==='manager'&&<button className="btn btn-ghost btn-sm" style={{background:'#f5f7f4',color:'var(--gr)',border:'1px solid var(--bd)'}} onClick={()=>{setModal({type:'edit',item});setForm({name:item.name,alt:item.alt||'',supplier:item.supplier,threshold:item.threshold||5});}}>✏</button>}
                              <button className="btn btn-ghost btn-sm" style={{background:'#f5f7f4',color:'var(--gr)',border:'1px solid var(--bd)'}} onClick={()=>setModal({type:'history',item})}>⚙</button>
                            </div></td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              ))}
              {filtered.length===0&&<div className="empty">No items match your search</div>}
            </>
          );
        })()}

        {!loading&&tab==='bol'&&(
          <div style={{maxWidth:700,margin:'20px auto'}}>
            <h2 style={{fontSize:16,fontWeight:700,marginBottom:16,color:'var(--mid)'}}>📦 BOL Scan & Receive {role==='supervisor'&&<span style={{fontSize:12,color:'var(--gr)',fontWeight:400}}>— Supervisor Mode</span>}</h2>

              <div style={{fontSize:32,marginBottom:8}}>📄</div>
              <div style={{fontWeight:600,color:'var(--gr)',marginBottom:4}}>Drop BOL or Invoice here</div>
              <div style={{fontSize:12,color:'#aaa'}}>Paper scans and PDFs supported — AI reads items automatically</div>
              {bolName&&<div style={{marginTop:8,fontSize:12,color:'var(--g)',fontWeight:600}}>📎 {bolName}</div>}
              {bolLoading&&<div style={{marginTop:10,color:'var(--gr)'}}>⏳ Analyzing document...</div>}
              <input id="bolInput" type="file" accept="image/*,application/pdf" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(f)procBol(f);}}/>
            </div>

              <div style={{background:'#fff',borderRadius:10,padding:18,border:'1px solid var(--bd)',marginBottom:16}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
                  <div><div style={{fontWeight:700,fontSize:15}}>{bolResult.supplier||'Unknown Supplier'}</div><div style={{fontSize:12,color:'var(--gr)'}}>Ref: {bolResult.bolNumber||'—'} · {bolResult.date||'—'}</div></div>
                  <button className="btn btn-g" onClick={receiveBol} disabled={saving}>{saving?<span className="spin"/>:'✓ Receive All'}</button>
                </div>

                  <div className="bol-row" key={idx}>
                    <div>
                      <div style={{fontWeight:600}}>{bi.name}</div>
                      {bi.unitPrice>0&&<div style={{fontSize:11,color:'var(--am)'}}>Unit price: ${bi.unitPrice.toFixed(2)}/{bi.unit||'unit'}</div>}

                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <input type="number" value={bolQty[idx]||''} onChange={e=>setBolQty(p=>({...p,[idx]:e.target.value}))} style={{width:70,border:'1px solid var(--bd)',borderRadius:5,padding:'4px 8px',fontSize:13}} placeholder="Qty"/>
                      <span style={{fontSize:12,color:'var(--gr)'}}>{bi.unit}</span>
                    </div>
                  </div>
                ))}
              </div>
            )}
            {bolResult&&bolResult.error&&<div style={{background:'#fff8f8',border:'1px solid rgba(192,57,43,0.2)',borderRadius:8,padding:14,color:'var(--r)',fontSize:13}}>⚠ {bolResult.error}</div>}

              <h3 style={{fontSize:14,fontWeight:700,marginBottom:14,color:'var(--mid)'}}>Manual Receive Entry</h3>
              <ManualForm items={items} onReceive={async(itemId,qty,note)=>{
                const item=items.find(i=>i.id===itemId);if(!item)return;
                const ns=parseFloat(((item.stock||0)+qty).toFixed(2));
                await api(`items?id=eq.${item.id}`,{method:'PATCH',body:JSON.stringify({stock:ns}),prefer:'return=minimal'});
                await api('transactions',{method:'POST',body:JSON.stringify({item_id:item.id,item_name:item.name,type:'in',qty,note}),prefer:'return=minimal'});
                setItems(p=>p.map(i=>i.id===item.id?{...i,stock:ns}:i));
                setTxs(p=>[{item_name:item.name,type:'in',qty,note,created_at:new Date().toISOString()},...p]);
                toast_(`✓ Received ${qty} ${item.unit} — ${item.name}`);
              }}/>
            </div>
          </div>
        )}

        {!loading&&tab==='history'&&(
          <div style={{maxWidth:800,margin:'20px auto'}}>

                <option value="all">All</option><option value="in">Received</option><option value="out">Used/Shipped</option><option value="correction">Corrections</option>

            {filteredHist.map((t,i)=>(
              <div key={i} className={`hist-item hi-${t.type==='in'?'in':t.type==='correction'?'fix':'out'}`}>

                  <span className={`hbadge hb-${t.type==='in'?'in':t.type==='correction'?'fix':'out'}`}>{t.type==='in'?'IN':t.type==='correction'?'FIX':'OUT'}</span>
                  <div><div style={{fontWeight:600,fontSize:13}}>{t.item_name}</div><div style={{fontSize:11,color:'var(--gr)'}}>{t.note}</div></div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontWeight:700,fontSize:14,color:t.type==='in'?'var(--g)':t.type==='correction'?'var(--am)':'var(--r)'}}>{t.type==='in'?'+':t.type==='correction'?'→':'-'}{(t.qty||0).toLocaleString()}</div>
                  <div style={{fontSize:11,color:'var(--gr)'}}>{fmtDate(t.created_at)}</div>
                </div>
              </div>
            ))}
            {filteredHist.length===0&&<div className="empty">No transactions found</div>}
          </div>
        )}

        {!loading&&tab==='reports'&&(
          <>
            <div className="inv-hdr"><h2>Reports</h2><div className="filters"><select className="fsel" value={catF} onChange={e=>setCatF(e.target.value)}>{cats.map(c=><option key={c}>{c}</option>)}</select></div></div>
            <div className="rpt-grid">
              {filtered.map(item=>{
                const st=getStatus(item);const stk=fmtStock(item);
                const lastIn=getLastTx(item.name,'in');
                const sUsed=txs.filter(t=>t.item_name===item.name&&t.type==='out').reduce((s,t)=>s+(t.qty||0),0);
                return(
                  <div key={item.id} className="rpt-card" onClick={()=>setModal({type:'history',item})}>
                    <div style={{fontWeight:700,fontSize:14,marginBottom:2}}>{item.name}</div>
                    {item.alt&&<div style={{fontSize:11,color:'var(--gr)',fontStyle:'italic',marginBottom:6}}>↳ {item.alt}</div>}
                    <div className={`stk${st==='low'?' low':st==='out'?' out':''}`} style={{marginBottom:2}}>{stk.main}</div>
                    {stk.sub&&<div className="stksub" style={{marginBottom:6}}>{stk.sub}</div>}
                    <div style={{display:'flex',justifyContent:'space-between',marginTop:8,paddingTop:6,borderTop:'1px solid #f0f4ee',fontSize:11,color:'var(--gr)'}}>
                      <span>{item.supplier}</span>
                      {sUsed>0&&<span>{sUsed.toLocaleString()} {item.unit} used</span>}
                      {lastIn&&<span>Rcvd {fmtDate(lastIn.created_at)}</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        )}

        {!loading&&tab==='dashboard'&&(
          <div style={{maxWidth:900,margin:'20px auto'}}>
            <h2 style={{fontSize:16,fontWeight:700,marginBottom:16,color:'var(--mid)'}}>Dashboard</h2>
            <div className="dash-cards">
              <div className="dc"><div className="dc-lbl">Total Items</div><div className="dc-val">{items.length}</div><div className="dc-sub">Active SKUs</div></div>
              <div className="dc"><div className="dc-lbl">Out of Stock</div><div className="dc-val" style={{color:'var(--r)'}}>{outItems.length}</div><div className="dc-sub">Need immediate action</div></div>
              <div className="dc"><div className="dc-lbl">Low Stock</div><div className="dc-val" style={{color:'var(--am)'}}>{lowItems.length}</div><div className="dc-sub">Below threshold</div></div>
              <div className="dc"><div className="dc-lbl">Transactions</div><div className="dc-val">{txs.length}</div><div className="dc-sub">Total this season</div></div>
            </div>
            <div style={{background:'#fff',borderRadius:10,padding:20,border:'1px solid var(--bd)',marginBottom:16}}>
              <h3 style={{fontSize:14,fontWeight:700,marginBottom:12,color:'var(--mid)'}}>Out of Stock</h3>
              {outItems.length===0?<div style={{color:'var(--gr)',fontSize:13}}>None</div>:outItems.map(i=><div key={i.id} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #f5f7f4',fontSize:13}}><span>{i.name}</span><span className="sout">OUT</span></div>)}
            </div>
            <div style={{background:'#fff',borderRadius:10,padding:20,border:'1px solid var(--bd)'}}>
              <h3 style={{fontSize:14,fontWeight:700,marginBottom:12,color:'var(--mid)'}}>Low Stock</h3>
              {lowItems.length===0?<div style={{color:'var(--gr)',fontSize:13}}>All above threshold</div>:lowItems.map(i=><div key={i.id} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #f5f7f4',fontSize:13}}><span>{i.name}</span><span className="slow">{(i.stock||0).toLocaleString()} {i.unit}</span></div>)}
            </div>
          </div>
        )}

        {!loading&&tab==='prerun'&&role==='manager'&&(
          <div style={{maxWidth:900,margin:'20px auto'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div><h2 style={{fontSize:16,fontWeight:700,color:'var(--mid)'}}>🌿 Pre-Run Storage</h2><div style={{fontSize:12,color:'var(--gr)'}}>Crown Packaging stored inventory · Manager access only · 2026 Season</div></div>
            </div>
            {PRERUN.map((pr,i)=>(
              <div key={i} className="prerun-card">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
                  <div><div style={{fontSize:16,fontWeight:700}}>{pr.name}</div><div style={{fontSize:12,color:'var(--gr)'}}>{pr.sub}</div></div>
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn btn-g btn-sm">📦 Scan BOL</button>
                    <button className="btn btn-sm" style={{background:'#fff8e1',color:'var(--am)',border:'1px solid rgba(212,124,10,0.3)'}}>🌿 Log Pull</button>
                  </div>
                </div>
                <div className="prerun-stats">
                  {[['Pre-Run Storage',`${pr.storage.toLocaleString()} boxes`],['# Pallets',`${pr.pf} full + ${pr.pr} boxes`],['Total Received',`${pr.recv.toLocaleString()} boxes`],['Total Pulled',`${pr.pulled} boxes`]].map(([l,v])=>(
                    <div key={l} className="ps"><div className="ps-lbl">{l}</div><div className="ps-val" style={{color:pr.storage===0?'var(--am)':undefined}}>{v}</div></div>

                      <div key={j} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #f5f7f4',fontSize:12}}>
                        <div><span style={{background:'var(--gb)',color:'var(--g)',border:'1px solid rgba(45,106,79,0.2)',padding:'2px 7px',borderRadius:4,fontSize:10,marginRight:8}}>STORED</span>{tx.lot}</div>
                        <div style={{color:'var(--g)',fontWeight:600}}>+{tx.qty.toLocaleString()} boxes</div>
                        <div style={{color:'var(--gr)'}}>{tx.date}</div>
                      </div>
                    ))}
                  </div>
                ):<div style={{fontSize:12,color:'var(--gr)',fontStyle:'italic'}}>No activity yet this season</div>}
              </div>
            ))}
          </div>
        )}
      </div>

      {modal&&modal.type==='in'&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <button className="modal-x" onClick={()=>setModal(null)}>×</button>
            <h3>+ Receive — {modal.item.name}</h3>
            <div style={{background:'var(--gb)',borderRadius:7,padding:'8px 12px',fontSize:13,color:'var(--g)',marginBottom:14}}>Current stock: {(modal.item.stock||0).toLocaleString()} {modal.item.unit}</div>
            <div className="fg"><label>Quantity ({modal.item.unit})</label><input className="fi" type="number" step="0.01" placeholder="0" value={form.qty||''} onChange={e=>setForm(p=>({...p,qty:e.target.value}))} autoFocus/></div>
            <div className="fg"><label>Note / BOL Reference</label><input className="fi" placeholder="BOL number, lot, delivery ref..." value={form.note||''} onChange={e=>setForm(p=>({...p,note:e.target.value}))}/></div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-g" onClick={doIn} disabled={saving} style={{flex:1}}>{saving?<span className="spin"/>:'✓ Save'}</button>

            </div>
          </div>
        </div>
      )}
      {modal&&modal.type==='out'&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>

            <h3>− Remove — {modal.item.name}</h3>
            <div style={{background:'var(--rb)',borderRadius:7,padding:'8px 12px',fontSize:13,color:'var(--r)',marginBottom:14}}>Current stock: {(modal.item.stock||0).toLocaleString()} {modal.item.unit}</div>
            <div className="fg"><label>Quantity ({modal.item.unit})</label><input className="fi" type="number" step="0.01" placeholder="0" value={form.qty||''} onChange={e=>setForm(p=>({...p,qty:e.target.value}))} autoFocus/></div>
            <div className="fg"><label>Note</label><input className="fi" placeholder="USED, SHIPPED, destination..." value={form.note||''} onChange={e=>setForm(p=>({...p,note:e.target.value}))}/></div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-r" onClick={doOut} disabled={saving} style={{flex:1}}>{saving?<span className="spin"/>:'✓ Remove'}</button>
              <button className="btn" style={{background:'#f5f7f4',color:'var(--gr)',border:'1px solid var(--bd)'}} onClick={()=>setModal(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
      {modal&&modal.type==='edit'&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <button className="modal-x" onClick={()=>setModal(null)}>×</button>
            <h3>Edit — {modal.item.name}</h3>
            <div className="fg"><label>Name</label><input className="fi" value={form.name||''} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>
            <div className="fg"><label>Alt Name</label><input className="fi" value={form.alt||''} onChange={e=>setForm(p=>({...p,alt:e.target.value}))}/></div>
            <div className="fg"><label>Supplier</label><input className="fi" value={form.supplier||''} onChange={e=>setForm(p=>({...p,supplier:e.target.value}))}/></div>
            <div className="fg"><label>Low Stock Threshold ({modal.item.unit})</label><input className="fi" type="number" value={form.threshold||''} onChange={e=>setForm(p=>({...p,threshold:e.target.value}))}/></div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-g" onClick={doEdit} disabled={saving} style={{flex:1}}>{saving?<span className="spin"/>:'✓ Save'}</button>
              <button className="btn" style={{background:'#f5f7f4',color:'var(--gr)',border:'1px solid var(--bd)'}} onClick={()=>setModal(null)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
      {modal&&modal.type==='history'&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal" style={{maxWidth:520}}>
            <button className="modal-x" onClick={()=>setModal(null)}>×</button>
            <h3>History — {modal.item.name}</h3>
            {txs.filter(t=>t.item_name===modal.item.name).slice(0,20).map((t,i)=>(
              <div key={i} className={`hist-item hi-${t.type==='in'?'in':t.type==='correction'?'fix':'out'}`} style={{marginBottom:6}}>
                <div style={{display:'flex',alignItems:'center',flex:1}}>
                  <span className={`hbadge hb-${t.type==='in'?'in':t.type==='correction'?'fix':'out'}`}>{t.type==='in'?'IN':t.type==='correction'?'FIX':'OUT'}</span>
                  <div style={{fontSize:11,color:'var(--gr)'}}>{t.note}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontWeight:700,color:t.type==='in'?'var(--g)':t.type==='correction'?'var(--am)':'var(--r)'}}>{t.type==='in'?'+':t.type==='correction'?'→':'-'}{(t.qty||0).toLocaleString()}</div>
                  <div style={{fontSize:11,color:'var(--gr)'}}>{fmtDate(t.created_at)}</div>
                </div>
              </div>
            ))}
            {txs.filter(t=>t.item_name===modal.item.name).length===0&&<div className="empty">No transactions yet</div>}
          </div>
        </div>
      )}
      {modal&&modal.type==='add'&&(
        <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setModal(null)}>
          <div className="modal">
            <button className="modal-x" onClick={()=>setModal(null)}>×</button>
            <h3>Add New Item</h3>
            <div className="fg"><label>Name</label><input className="fi" value={form.name||''} onChange={e=>setForm(p=>({...p,name:e.target.value}))} autoFocus/></div>
            <div className="fg"><label>Alt Name</label><input className="fi" value={form.alt||''} onChange={e=>setForm(p=>({...p,alt:e.target.value}))}/></div>
            <div className="fr">
              <div className="fg"><label>Supplier</label><input className="fi" value={form.supplier||''} onChange={e=>setForm(p=>({...p,supplier:e.target.value}))}/></div>
              <div className="fg"><label>Category</label><select className="fi" value={form.category||'Bags'} onChange={e=>setForm(p=>({...p,category:e.target.value}))}><option>Bags</option><option>Boxes & Trays</option><option>Labels</option><option>Supplies</option></select></div>
            </div>
            <div className="fr">
              <div className="fg"><label>Unit</label><input className="fi" value={form.unit||'boxes'} onChange={e=>setForm(p=>({...p,unit:e.target.value}))}/></div>
              <div className="fg"><label>Threshold</label><input className="fi" type="number" value={form.threshold||5} onChange={e=>setForm(p=>({...p,threshold:e.target.value}))}/></div>
            </div>
            <button className="btn btn-g" style={{width:'100%',marginTop:8}} disabled={saving} onClick={async()=>{
              if(!form.name)return;setSaving(true);
              try{
                const r=await api('items',{method:'POST',body:JSON.stringify({name:form.name,alt:form.alt||'',supplier:form.supplier||'',category:form.category||'Bags',stock:0,threshold:parseFloat(form.threshold)||5,unit:form.unit||'boxes',conv:1,conv_unit:form.unit||'boxes'}),prefer:'return=representation'});
                if(r&&r[0])setItems(p=>[...p,r[0]].sort((a,b)=>a.name.localeCompare(b.name)));
                setModal(null);setForm({});toast_(`✓ ${form.name} added`);
              }catch(e){toast_('Save failed','err');}
              setSaving(false);
            }}>{saving?<span className="spin"/>:'✓ Add Item'}</button>
          </div>
        </div>
      )}
      {toast&&<div className={`toast${toast.err?' err':''}`}>{toast.msg}</div>}
    </div>
  );
}

function ManualForm({items,onReceive}){
  const [sel,setSel]=useState('');const [qty,setQty]=useState('');const [note,setNote]=useState('');const [saving,setSaving]=useState(false);
  const item=items.find(i=>i.id===sel);
  return(
    <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 2fr auto',gap:8,alignItems:'flex-end'}}>
      <div><label style={{fontSize:11,fontWeight:700,color:'var(--gr)',display:'block',marginBottom:4}}>ITEM</label>
        <select style={{width:'100%',border:'1px solid var(--bd)',borderRadius:6,padding:'8px 10px',fontSize:13,fontFamily:'inherit'}} value={sel} onChange={e=>setSel(e.target.value)}>
          <option value="">Select item...</option>
          {items.map(i=><option key={i.id} value={i.id}>{i.name}</option>)}
        </select>
      </div>
      <div><label style={{fontSize:11,fontWeight:700,color:'var(--gr)',display:'block',marginBottom:4}}>QTY{item?` (${item.unit})`:''}</label>
        <input style={{width:'100%',border:'1px solid var(--bd)',borderRadius:6,padding:'8px 10px',fontSize:13,fontFamily:'inherit'}} type="number" step="0.01" placeholder="0" value={qty} onChange={e=>setQty(e.target.value)}/>
      </div>
      <div><label style={{fontSize:11,fontWeight:700,color:'var(--gr)',display:'block',marginBottom:4}}>NOTE</label>
        <input style={{width:'100%',border:'1px solid var(--bd)',borderRadius:6,padding:'8px 10px',fontSize:13,fontFamily:'inherit'}} placeholder="BOL#, lot..." value={note} onChange={e=>setNote(e.target.value)}/>
      </div>
      <button className="btn btn-g" disabled={saving||!sel||!qty} onClick={async()=>{setSaving(true);await onReceive(sel,parseFloat(qty),note);setSel('');setQty('');setNote('');setSaving(false);}}>
        {saving?'...':'+ Receive'}
      </button>
    </div>
  );
}

function ChangePinForm({current,onSave,dark}){
  const [cur,setCur]=useState('');const [nw,setNw]=useState('');const [cf,setCf]=useState('');const [msg,setMsg]=useState('');
  const s=dark?{background:'rgba(255,255,255,0.07)',border:'1px solid rgba(255,255,255,0.12)',color:'#fff',fontSize:14,padding:'10px 12px',borderRadius:6,fontFamily:'inherit',width:'100%'}:{};
  const submit=()=>{
    if(cur!==current){setMsg('Current PIN incorrect');return;}
    if(!/^\d{4}$/.test(nw)){setMsg('New PIN must be 4 digits');return;}
    if(nw!==cf){setMsg('PINs do not match');return;}
    onSave(nw);setCur('');setNw('');setCf('');setMsg('✓ PIN updated');setTimeout(()=>setMsg(''),3000);
  };
  const iStyle=dark?s:{width:'100%',border:'1px solid var(--bd)',borderRadius:6,padding:'10px 12px',fontSize:14,fontFamily:'inherit'};
  return(
    <div className="cp-form">
      <div><label style={{fontSize:11,fontWeight:700,color:dark?'rgba(255,255,255,0.4)':'var(--gr)',display:'block',marginBottom:5}}>CURRENT PIN</label><input type="password" maxLength={4} value={cur} onChange={e=>setCur(e.target.value)} style={iStyle} placeholder="Current 4-digit PIN"/></div>
      <div><label style={{fontSize:11,fontWeight:700,color:dark?'rgba(255,255,255,0.4)':'var(--gr)',display:'block',marginBottom:5}}>NEW PIN</label><input type="password" maxLength={4} value={nw} onChange={e=>setNw(e.target.value)} style={iStyle} placeholder="New 4 digits"/></div>
      <div><label style={{fontSize:11,fontWeight:700,color:dark?'rgba(255,255,255,0.4)':'var(--gr)',display:'block',marginBottom:5}}>CONFIRM</label><input type="password" maxLength={4} value={cf} onChange={e=>setCf(e.target.value)} style={iStyle} placeholder="Confirm new PIN"/></div>
      <button className="btn btn-g" onClick={submit} style={{width:'100%'}}>Update PIN</button>
      {msg&&<div style={{fontSize:13,color:msg.startsWith('✓')?'#81c784':'#ef9a9a'}}>{msg}</div>}
    </div>
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
