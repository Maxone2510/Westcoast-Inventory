<script type="text/babel">
const{useState,useRef,useMemo,useEffect,useCallback}=React;
const SU="https://nazhhbkolgnyhpvjlfoo.supabase.co";
const SK="sb_publishable_XwHn-Chabu5m-gBDy2cbxg_wqczSqPt";
const api=(p,o={})=>fetch(`${SU}/rest/v1/${p}`,{...o,headers:{"Content-Type":"application/json","apikey":SK,"Authorization":`Bearer ${SK}`,"Prefer":o.prefer||"return=representation",...(o.headers||{})}}).then(r=>r.json());

/* ── PACK SIZE CONFIG ──────────────────────────────────────────────────────
   mode:
   'box_total'   = stock IS total boxes; secondary = pallets equivalent
   'pallet'      = stock IS pallets;     secondary = total boxes/units
   'box_bag'     = stock IS boxes;       secondary = total bags
   'roll_bag'    = stock IS rolls;       secondary = total bags
   'label'       = stock IS rolls;       secondary = cases + total labels
*/
const PS={
  "5 LB":                          {mode:'box_total',  per:750,  su:'pallets',    hint:'750 boxes/pallet'},
  "Windset 11 lb - Revised":       {mode:'pallet',     per:400,  su:'boxes',      hint:'400 boxes/pallet'},
  "60x40 DEEPGENERIC":             {mode:'pallet',     per:400,  su:'boxes',      hint:'400 boxes/pallet'},
  "12pk (11lb) Lid":               {mode:'pallet',     per:2100, su:'lids',       hint:'2,100 lids/pallet'},
  "25 lb Lid":                     {mode:'pallet',     per:2144, su:'lids',       hint:'2,144 lids/pallet'},
  "PEPPER ASSORTED TR":            {mode:'pallet',     per:400,  su:'boxes',      hint:'400/pallet'},
  "2 Layer Revised (COSTCO)":      {mode:'pallet',     per:400,  su:'boxes',      hint:'400/pallet'},
  "25 lb Pepper HF":               {mode:'pallet',     per:255,  su:'boxes',      hint:'255/pallet'},
  "25 lb Bulk Tray":               {mode:'pallet',     per:400,  su:'boxes',      hint:'400/pallet'},
  "Sysco 11 lb Box":               {mode:'pallet',     per:400,  su:'boxes',      hint:'400/pallet'},
  "Sysco 25 lb Boxes":             {mode:'pallet',     per:400,  su:'boxes',      hint:'400/pallet'},
  "IP 25lb Boxes":                 {mode:'pallet',     per:200,  su:'boxes',      hint:'200/pallet'},
  "IP 11 lb Boxes - USA":          {mode:'pallet',     per:200,  su:'boxes',      hint:'200/pallet'},
  "IP 11# WF PEPPER EC":           {mode:'pallet',     per:200,  su:'boxes',      hint:'200/pallet'},
  "4x6ct Plain Zipper Loblaws":    {mode:'box_bag',    per:1000, su:'bags',       hint:'1,000 bags/box'},
  "3CT Amazon Rainbow Bags":       {mode:'box_bag',    per:3000, su:'bags',       hint:'3,000 bags/box'},
  "3CT Amazon Rainbow Roll-Film":  {mode:'roll_bag',   per:5000, su:'bags',       hint:'5,000 bags/roll'},
  "3CT Amazon Stoplight":          {mode:'box_bag',    per:3000, su:'bags',       hint:'3,000 bags/box'},
  "3pk Maestro Windset Bag":       {mode:'box_bag',    per:3000, su:'bags',       hint:'3,000 bags/box'},
  "8x3CT Farmers Market":          {mode:'box_bag',    per:1000, su:'bags',       hint:'1,000 bags/box'},
  "8x3CT Compliments (Sobeys)":    {mode:'box_bag',    per:3000, su:'bags',       hint:'3,000 bags/box'},
  "8x3CT Compliments Plain Bags":  {mode:'box_bag',    per:3000, su:'bags',       hint:'3,000 bags/box'},
  "8x3ct Good and Gather Bags":    {mode:'box_bag',    per:3000, su:'bags',       hint:'3,000 bags/box'},
  "3ct Good and Gather Roll-Film": {mode:'roll_bag',   per:5000, su:'bags',       hint:'5,000 bags/roll'},
  "6ct/2LB Kroger":                {mode:'box_bag',    per:1000, su:'bags',       hint:'1,000 bags/box'},
  "Tri-colour 3ct Kroger CAN":     {mode:'box_bag',    per:2000, su:'bags',       hint:'2,000 bags/box'},

  "Costco 6pk No Weight":          {mode:'box_bag',    per:1000, su:'bags',       hint:'1,000 bags/box'},
  "Costco 6pk With Weight":        {mode:'box_bag',    per:1000, su:'bags',       hint:'1,000 bags/box'},

  "Costco 6CT Maestro Roll-Film":  {mode:'roll_bag',   per:4500, su:'bags',       hint:'4,500 bags/roll'},
  "Loblaws 2.5lb":                 {mode:'box_bag',    per:1000, su:'bags',       hint:'1,000 bags/box'},
  "2.5LB Bell Pepper Costco Zipper":{mode:'box_bag',   per:1000, su:'bags',       hint:'1,000 bags/box'},
  "Breathway":                     {mode:'box_bag',    per:500,  su:'bags',       hint:'500 bags/box'},

  "8x3ct Compliments Preprint Labels":{mode:'box_bag', per:3000, su:'bags',       hint:'3,000 bags/box'},
  "PLU Label Red (4688)":          {mode:'label',      rpc:6,    lpl:37000,       hint:'6 rolls/case · 37k labels/roll'},
  "PLU Label Yellow (4689)":       {mode:'label',      rpc:6,    lpl:37000,       hint:'6 rolls/case · 37k labels/roll'},
  "PLU Label Orange (3121)":       {mode:'label',      rpc:6,    lpl:37000,       hint:'6 rolls/case · 37k labels/roll'},
  "4x2 Blank Labels":              {mode:'label',      rpc:4,    lpl:3500,        hint:'4 rolls/case · 3,500 labels/roll'},
  "4x8 Famous Labels":             {mode:'label',      rpc:4,    lpl:750,         hint:'4 rolls/case · 750 labels/roll'},
  "2x4 Blank Labels":              {mode:'label',      rpc:2,    lpl:8000,        hint:'2 rolls/case · 8,000 labels/roll'},
};

function disp(name,stock){
  if(!stock&&stock!==0)return{p:'0',s:null,t:null};
  const c=PS[name];
  if(!c)return{p:stock.toLocaleString(),s:null,t:null};
  if(c.mode==='box_total'){
    const pal=Math.floor(stock/c.per),rem=stock%c.per;
    return{p:stock.toLocaleString()+' boxes',s:rem>0?`≈${pal} pallets + ${rem} boxes`:`${pal} pallets`,t:null};
  }
  if(c.mode==='pallet'){
    return{p:stock.toLocaleString()+' pallets',s:`${(stock*c.per).toLocaleString()} ${c.su}`,t:null};
  }
  if(c.mode==='box_bag'){
    return{p:stock.toLocaleString()+' boxes',s:`${(stock*c.per).toLocaleString()} bags`,t:null};
  }
  if(c.mode==='roll_bag'){
    return{p:stock.toLocaleString()+' rolls',s:`${(stock*c.per).toLocaleString()} bags`,t:null};
  }
  if(c.mode==='label'){
    const cs=Math.floor(stock/c.rpc),rem=stock%c.rpc;
    const cstr=rem>0?`${cs} cases + ${rem} rolls`:`${cs} cases`;
    return{p:stock+' rolls',s:cstr,t:((stock*c.lpl).toLocaleString())+' labels'};
  }
  return{p:stock.toLocaleString(),s:null,t:null};

function gSeason(){const n=new Date(),y=n.getFullYear(),s=new Date(y,2,1),e=new Date(y,11,1);if(n>=s&&n<e)return y;return n<s?y-1:y+1;}
function sLbl(y){return`${y} Season (Mar 1 – Dec 1)`;}
function inS(d,y){const dt=new Date(d);return dt>=new Date(y,2,1)&&dt<new Date(y,11,1);}
function fmt(d){return new Date(d).toLocaleDateString("en-CA",{month:"short",day:"numeric",year:"numeric"});}
function pep(c){return c==="Bags"?"🧡":c==="Labels"?"💛":c==="Supplies"?"🌿":"🫑";}

  ["Boxes & Trays","Bags","Supplies","Labels"].forEach(cat=>{

    h+=`<div class="csc"><div class="csct">${pep(cat)} ${cat.toUpperCase()}</div>

      <th style="width:13%">Notes</th>
    </tr></thead><tbody>`;
    ci.forEach(item=>{
      const d=disp(item.name,item.stock);
      const ps=PS[item.name];
      h+=`<tr>
        <td><strong>${item.name}</strong>${ps?`<br/><span style="font-size:7px;color:#aaa">${ps.hint}</span>`:''}</td>

        </td>
        <td class="nc"></td>
        <td></td>
      </tr>`;
    });
    h+=`</tbody></table></div>`;
  });

  h+=`<div class="csf"><div>Westcoast Vegetables Ltd. · ${today}</div><div>Signature: ________________________</div></div>`;
  return h;
}

    if(!file)return;setBfn(file.name);setBp(true);setBr(null);setBq({});
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      let c=[];
      const prompt=`Analyze this Bill of Lading for Westcoast Vegetables Ltd., a pepper packaging facility in Delta BC.
Extract ALL items. Product codes 28580001=WS 11LB, 14160085=Tall Generic, 14160066=Maestro are key.
Return ONLY valid JSON: {"bolNumber":"...","date":"...","supplier":"...","items":[{"name":"...","qty":0,"unit":"...","productCode":"..."}]}`;
      if(file.type.startsWith("image/"))c=[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:prompt}];
      else if(file.type==="application/pdf")c=[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:prompt}];
      if(c.length){
        const rsp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages:[{role:"user",content:c}]})});
        const data=await rsp.json();
        const text=data.content?.map(b=>b.text||"").join("")||"";
        try{
          const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
          const matched=parsed.items.map(bi=>{
            const nl=bi.name.toLowerCase(),pc=(bi.productCode||"").toLowerCase();
            const found=items.find(i=>{
              const nm=i.name.toLowerCase(),al=(i.alt||"").toLowerCase();
              return nm.includes(nl.substring(0,7))||nl.includes(nm.substring(0,7))||al.includes(nl.substring(0,6))||nl.includes(al.substring(0,6))||(pc&&al.includes(pc));
            });
            return{...bi,matched:found||null};
          });
          setBr({...parsed,items:matched});
          const iq={};matched.forEach((it,idx)=>{iq[idx]=it.qty;});setBq(iq);
          if(parsed.bolNumber)setBn(`BOL #${parsed.bolNumber}`);
        }catch{setBr({error:"Could not read BOL."});}
      }else setBr({error:"Unsupported file type."});
    }catch{setBr({error:"Analysis failed."});}
    setBp(false);
  };

  const saveBol=async()=>{
    if(!bu){toast_("Please enter your name","error");return;}

    setSaving(true);
    const today=new Date().toISOString().split("T")[0];

    for(let idx=0;idx<br.items.length;idx++){

      const qty=parseInt(bq[idx])||0;if(qty<=0)continue;
      try{
        const ns=bi.matched.stock+qty;
        await api(`items?id=eq.${bi.matched.id}`,{method:"PATCH",body:JSON.stringify({stock:ns}),prefer:"return=minimal"});
        await api("transactions",{method:"POST",body:JSON.stringify({item_id:bi.matched.id,type:"received",qty,date:today,note:bn||`BOL: ${bfn}`,username:bu}),prefer:"return=minimal"});
        setItems(p=>p.map(i=>i.id===bi.matched.id?{...i,stock:ns}:i));
        setHist(p=>[{id:Date.now()+idx,item_id:bi.matched.id,type:"received",qty,date:today,note:bn||`BOL: ${bfn}`,username:bu},...p]);
        saved++;
      }catch{}
    }
    setBols(p=>[{id:Date.now(),fileName:bfn,note:bn,user:bu,date:today,itemCount:saved},...p]);

                <button className="btn bgh" onClick={()=>{setBr(null);setBfn("");}}>Clear</button>

            {br?.error&&<div style={{padding:"12px",background:"var(--rb)",border:"1px solid rgba(192,57,43,0.2)",borderRadius:6,color:"var(--r)",fontSize:11,marginTop:9}}>⚠️ {br.error}</div>}
          </div>
          {bols.length>0&&<><div className="st2" style={{marginBottom:9}}>Saved BOLs</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>{bols.map(b=><div key={b.id} style={{background:"var(--w)",border:"1px solid var(--bd)",borderRadius:6,padding:"9px 12px",display:"flex",alignItems:"center",gap:9}}><span style={{fontSize:16}}>📄</span><div style={{flex:1}}><div style={{fontWeight:600,fontSize:11}}>{b.note||b.fileName}</div><div style={{fontSize:8,color:"var(--gr)"}}>{fmt(b.date)} · {b.user}</div></div><div style={{fontSize:10,color:"var(--g)",fontWeight:600}}>{b.itemCount} items updated</div></div>)}</div>

        {tab==="history"&&<>
          <div className="sh">
            <div className="st2">Transaction History</div>
            <div className="fr"><SN/><button className="btn bgh bs no-print" onClick={()=>window.print()}>🖨 Print</button></div>
          </div>
          {/* Search & Filter bar */}
          <div style={{background:"var(--w)",border:"1px solid var(--bd)",borderRadius:8,padding:"10px 13px",marginBottom:12,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>

              <input className="si" style={{width:"100%"}} placeholder="Search item name…" value={hq2} onChange={e=>setHq2(e.target.value)}/>

            <select className="fi" value={htype} onChange={e=>setHtype(e.target.value)}>
              <option value="All">All Types</option>
              <option value="received">IN only</option>

            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"var(--gr)"}}>
              <span>From:</span>

        {tab==="order"&&<>

            </div>
            {(()=>{
              if(!orderItem||!orderQty)return(
                <div style={{textAlign:"center",padding:"30px 20px",color:"var(--gr)"}}>

                  <div style={{fontSize:10,marginTop:4}}>The calculator will show if you have enough stock to fill the order</div>
                </div>
              );
              const item=items.find(i=>i.id===parseInt(orderItem));
              if(!item)return null;
              const ps=PS[item.name];
              const oq=parseInt(orderQty)||0;
              const stock=item.stock;
              // Calculate total units available and needed
              let unitsAvail=0,unitsNeeded=0,unitLabel="",stockLabel="";
              if(ps.mode==='box_bag'||ps.mode==='roll_bag'){
                unitsAvail=stock*ps.per;
                unitsNeeded=oq; // order qty IS bags needed
                unitLabel="bags";
                stockLabel=`${stock} ${item.unit} × ${ps.per.toLocaleString()} bags = ${unitsAvail.toLocaleString()} bags`;
              } else if(ps.mode==='pallet'){
                unitsAvail=stock*ps.per;
                unitsNeeded=oq;
                unitLabel=ps.su;
                stockLabel=`${stock} pallets × ${ps.per} = ${unitsAvail.toLocaleString()} ${ps.su}`;
              } else if(ps.mode==='box_total'){
                unitsAvail=stock;
                unitsNeeded=oq;
                unitLabel="boxes";
                stockLabel=`${stock.toLocaleString()} boxes on hand`;
              }
              const canFill=unitsAvail>=unitsNeeded;
              const shortfall=unitsNeeded-unitsAvail;
              const pctFill=unitsNeeded>0?Math.min(100,Math.round((unitsAvail/unitsNeeded)*100)):0;
              return(
                <div>
                  <div style={{background:canFill?"rgba(45,106,47,0.08)":"rgba(192,57,43,0.06)",border:`1px solid ${canFill?"rgba(45,106,47,0.2)":"rgba(192,57,43,0.2)"}`,borderRadius:9,padding:"16px 18px",marginBottom:14}}>
                    <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                      <div style={{fontSize:36}}>{canFill?"✅":"❌"}</div>
                      <div>
                        <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:canFill?"var(--g)":"var(--r)"}}>
                          {canFill?`Yes! You can fill this order`:`Not enough stock`}
                        </div>
                        <div style={{fontSize:11,color:"var(--gr)",marginTop:2}}>
                          {canFill
                            ?`You have ${unitsAvail.toLocaleString()} ${unitLabel} — need ${unitsNeeded.toLocaleString()} ${unitLabel}`
                            :`Short by ${shortfall.toLocaleString()} ${unitLabel} — you only have ${unitsAvail.toLocaleString()}`}
                        </div>
                      </div>
                    </div>
                    <div style={{marginTop:12}}>
                      <div style={{height:8,background:"rgba(0,0,0,0.08)",borderRadius:4,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${pctFill}%`,background:canFill?"var(--g)":"var(--r)",borderRadius:4,transition:"width 0.3s"}}></div>
                      </div>
                      <div style={{fontSize:9,color:"var(--gr)",marginTop:3}}>{pctFill}% of order can be filled</div>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9}}>
                    {[
                      ["On Hand",`${stock.toLocaleString()} ${item.unit}`,"var(--g)"],
                      ["Total Units",`${unitsAvail.toLocaleString()} ${unitLabel}`,"var(--dk)"],
                      ["Order Needs",`${unitsNeeded.toLocaleString()} ${unitLabel}`,canFill?"var(--g)":"var(--r)"],
                    ].map(([l,v,c])=>(
                      <div key={l} style={{background:"var(--bg)",borderRadius:7,padding:"10px 13px",border:"1px solid var(--bd)"}}>
                        <div style={{fontSize:8,color:"var(--gr)",textTransform:"uppercase",letterSpacing:"0.4px",fontWeight:700,marginBottom:3}}>{l}</div>
                        <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:c}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{marginTop:10,padding:"8px 12px",background:"var(--gb)",borderRadius:6,fontSize:10,color:"var(--gr)"}}>
                    📋 {item.name} · {ps.hint} · {stockLabel}

                </div>
              );
            })()}
          </div>
          {/* Quick reference for all bag items */}
          <div className="st2" style={{marginBottom:9}}>Quick Stock Reference — All Bag Items</div>

                <th style={{background:"var(--dk)",color:"rgba(255,255,255,0.65)",fontSize:9,fontWeight:700,letterSpacing:"0.6px",textTransform:"uppercase",padding:"8px 11px",textAlign:"left"}}>Stock</th>
                <th style={{background:"var(--dk)",color:"rgba(255,255,255,0.65)",fontSize:9,fontWeight:700,letterSpacing:"0.6px",textTransform:"uppercase",padding:"8px 11px",textAlign:"left"}}>Total Bags Available</th>
                <th style={{background:"var(--dk)",color:"rgba(255,255,255,0.65)",fontSize:9,fontWeight:700,letterSpacing:"0.6px",textTransform:"uppercase",padding:"8px 11px",textAlign:"left"}}>Pack Size</th>
              </tr></thead>
              <tbody>
                {items.filter(i=>PS[i.name]&&(PS[i.name].mode==='box_bag'||PS[i.name].mode==='roll_bag')).map(item=>{
                  const ps=PS[item.name];
                  const total=item.stock*ps.per;
                  const s=st(item);
                  return <tr key={item.id} style={{borderBottom:"1px solid var(--bd)",background:s==="out"?"var(--rb)":s==="low"?"var(--ab)":""}}>
                    <td style={{padding:"8px 11px",fontSize:11,fontWeight:600}}>{item.name}</td>
                    <td style={{padding:"8px 11px",fontSize:11,color:s==="out"?"var(--r)":s==="low"?"var(--am)":"var(--g)",fontWeight:600}}>{item.stock} {item.unit}</td>
                    <td style={{padding:"8px 11px",fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,color:s==="out"?"var(--r)":"var(--dk)"}}>{total.toLocaleString()} bags</td>
                    <td style={{padding:"8px 11px",fontSize:9,color:"var(--gr)"}}>{ps.hint}</td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>
        </>}

        {tab==="reports"&&<>
          <div className="sh">

          <div style={{background:"var(--w)",border:"1px solid var(--bd)",borderRadius:9,padding:"13px 15px",marginBottom:14}}>

              <select className="fi" style={{flex:1,minWidth:220,padding:"7px 9px",fontSize:11}} value={reportItem?.id||""} onChange={e=>{const it=items.find(i=>i.id===parseInt(e.target.value));setReportItem(it||null);}}>
                <option value="">— Choose an item to view its report —</option>

                  <optgroup key={cat} label={`${pep(cat)} ${cat}`}>

            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
              {items.map(item=>{

                const d=disp(item.name,item.stock);

                return <div key={item.id} style={{background:"var(--w)",border:"1px solid var(--bd)",borderRadius:8,padding:"11px 13px",cursor:"pointer",transition:"all 0.15s",borderLeft:`3px solid ${s==="out"?"var(--r)":s==="low"?"var(--am)":"var(--g)"}`}} onClick={()=>setReportItem(item)}>
                  <div style={{fontWeight:600,fontSize:11,color:"var(--dk)"}}>{pep(item.category)} {item.name}</div>
                  {item.alt&&<div style={{fontSize:9,color:"var(--gr)",fontStyle:"italic",marginTop:1}}>{item.alt}</div>}

                    <div><div style={{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,color:"var(--dk)"}}>{timesRecv}</div><div style={{fontSize:8,color:"var(--gr)"}}>deliveries</div></div>
                  </div>
                  {d.s&&<div style={{fontSize:9,color:"var(--g)",fontWeight:600,marginTop:4}}>{d.s}</div>}
                </div>;
              })}
            </div>
          ):(()=>{
            const item=reportItem;
            const allH=hist.filter(h=>h.item_id===item.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
            const recvH=allH.filter(h=>h.type==="received");
            const usedH=allH.filter(h=>h.type==="used");
            const thisSeasonH=allH.filter(h=>inS(h.date,yr));
            const thisRecv=thisSeasonH.filter(h=>h.type==="received").reduce((s,h)=>s+h.qty,0);
            const thisUsed=thisSeasonH.filter(h=>h.type==="used").reduce((s,h)=>s+h.qty,0);
            const timesRecv=recvH.length;
            const d=disp(item.name,item.stock);
            const s=st(item);
            const ps=PS[item.name];
            // Avg days between deliveries
            let avgDays=null;
            if(recvH.length>=2){
              const dates=recvH.map(h=>new Date(h.date)).sort((a,b)=>b-a);
              let total=0;for(let i=0;i<dates.length-1;i++)total+=(dates[i]-dates[i+1])/(1000*60*60*24);
              avgDays=Math.round(total/(dates.length-1));
            }
            return(
              <div>
                {/* Header card */}
                <div style={{background:"linear-gradient(135deg,#1a2018,#2d3d2b)",borderRadius:10,padding:"16px 18px",marginBottom:14,border:"1px solid rgba(232,197,58,0.2)"}}>

                    <div>
                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700,color:"#fff"}}>{pep(item.category)} {item.name}</div>

                      <div style={{fontSize:10,color:"rgba(255,255,255,0.4)",marginTop:2}}>{item.supplier} · {item.category}</div>

                    </div>
                  </div>

                {/* Stats grid */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:9,marginBottom:14}}>
                  {[
                    ["Times Received",timesRecv,"var(--g)","all time"],
                    ["This Season Received",thisRecv,"var(--g)",`${yr} season`],
                    ["This Season Used",thisUsed,"var(--am)",`${yr} season`],
                    ["Avg Days Between Deliveries",avgDays!==null?`${avgDays}d`:"—","var(--dk)","based on history"],
                  ].map(([l,v,c,sub])=>(
                    <div key={l} style={{background:"var(--w)",border:"1px solid var(--bd)",borderRadius:8,padding:"12px 13px"}}>
                      <div style={{fontSize:8,color:"var(--gr)",textTransform:"uppercase",letterSpacing:"0.4px",fontWeight:700,marginBottom:3}}>{l}</div>
                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:c}}>{typeof v==="number"?v.toLocaleString():v}</div>
                      <div style={{fontSize:8,color:"#bbb",marginTop:1}}>{sub}</div>
                    </div>
                  ))}
                </div>
                {/* Full history */}
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:700,color:"var(--dk)",marginBottom:8}}>Full Transaction History</div>
                {allH.length===0?<div className="em"><div>No transactions recorded yet</div></div>
                :<div className="hl">{allH.map(h=>{
                  const isc=h.type==="correction";
                  return <div key={h.id} className={`hi ${isc?"correction":h.type}`}>
                    <span className={`hb ${isc?"hbc":h.type==="received"?"hbr":"hbu"}`}>{isc?"FIX":h.type==="received"?"IN":"OUT"}</span>
                    <div className="hi2"><div className="hn">{h.note}</div><div className="ht">{h.username}</div></div>
                    <div className="hr">
                      <div className="hq" style={{color:isc?"#9b59b6":h.type==="received"?"var(--g)":"var(--am)"}}>{h.type==="received"?"+":""}{h.qty} <span style={{fontSize:8,fontWeight:400,color:"#aaa"}}>{item.unit}</span></div>
                      <div className="hd">{fmt(h.date)}</div>
                    </div>
                  </div>;
                })}</div>}
              </div>
            );
          })()}
        </>}
      {modal&&<div className="ov" onClick={e=>e.target===e.currentTarget&&closeM()}>
        <div className="mo">
          {modal.type==="receive"&&<>
            <div className="mt">📥 Receive Inventory</div>
            <div className="mp">
              <strong>{modal.item.name}</strong>
              {modal.item.alt&&<div style={{fontStyle:"italic",color:"var(--gr)",fontSize:9,marginTop:1}}>Also known as: {modal.item.alt}</div>}

                <span>✅</span><div style={{flex:1}}><div style={{fontWeight:600}}>{mfn}</div>{ma2&&<div style={{color:"var(--am)",fontSize:9}}>🤖 Analyzing…</div>}</div>
                <button className="btn bgh bs" onClick={()=>{setMf(null);setMfn("");setMar(null);}}>✕</button>
              </div>}
              {mar&&!mar.error&&<div style={{background:"var(--gb)",border:"1px solid var(--bd)",borderRadius:6,padding:"8px 10px",marginTop:6}}>
                <div style={{fontSize:8,fontWeight:700,color:"var(--g)",letterSpacing:"0.6px",textTransform:"uppercase",marginBottom:4}}>🤖 Extracted</div>
                {mar.items?.map((it,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",borderBottom:"1px solid var(--bd)",fontSize:9}}><span>{it.name}</span><span style={{fontWeight:700,color:"var(--g)"}}>{it.qty} {it.unit}</span></div>)}
              </div>}
            </div>
            <div className="fl">
              <label>Quantity Received * ({modal.item.unit})</label>
              <input type="number" min="1" placeholder={`How many ${modal.item.unit}?`} value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))}/>
              {form.qty&&parseInt(form.qty)>0&&(()=>{const d=disp(modal.item.name,parseInt(form.qty));return d.s?<div className="fh">= {d.s}</div>:null;})()}
            </div>
            <div className="fl"><label>BOL / Reference Note</label><input type="text" placeholder="e.g. BOL #7890" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/></div>
            <div className="fl"><label>Received By *</label><input type="text" placeholder="Your name" value={form.user} onChange={e=>setForm(f=>({...f,user:e.target.value}))}/></div>
            <div className="ma"><button className="btn bgh" onClick={closeM}>Cancel</button><button className="btn bg2" onClick={doRecv} disabled={!form.qty||!form.user||saving}>{saving?"Saving…":"Confirm Receipt"}</button></div>
          </>}

          {modal.type==="use"&&<>
            <div className="mt">📤 Record Usage</div>
            <div className="mp">
              <strong>{modal.item.name}</strong>
              {modal.item.alt&&<div style={{fontStyle:"italic",color:"var(--gr)",fontSize:9,marginTop:1}}>Also known as: {modal.item.alt}</div>}
              {(()=>{const d=disp(modal.item.name,modal.item.stock);return<div className="md">Stock: {d.p}{d.s?` = ${d.s}`:""}</div>;})()}
              <div style={{color:"var(--gr)",fontSize:9,marginTop:1}}>Season used: {sqty(modal.item.id,"used")} {modal.item.unit}</div>
            </div>
            <div className="fl">
              <label>Quantity Used * ({modal.item.unit})</label>
              <input type="number" min="1" max={modal.item.stock} placeholder="e.g. 5" value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))}/>
              {form.qty&&parseInt(form.qty)>0&&(()=>{const d=disp(modal.item.name,parseInt(form.qty));return d.s?<div className="fh">= {d.s}</div>:null;})()}
            </div>
            <div className="fl"><label>Reason / Line</label><input type="text" placeholder="e.g. Line 2 run" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/></div>

            <div className="ma"><button className="btn bgh" onClick={closeM}>Cancel</button><button className="btn bdr" onClick={doUse} disabled={!form.qty||!form.user||saving}>{saving?"Saving…":"Record Usage"}</button></div>
          </>}

          {modal.type==="mgrStock"&&<>
            <div className="mt">✏️ Manager: Correct Stock</div>
            <div className="mp">
              <strong>{modal.item.name}</strong>
              {(()=>{const d=disp(modal.item.name,modal.item.stock);return<div className="md">Current: {d.p}{d.s?` = ${d.s}`:""}</div>;})()}
            </div>
            <div style={{background:"rgba(201,168,32,0.1)",border:"1px solid rgba(201,168,32,0.3)",borderRadius:6,padding:"7px 10px",fontSize:10,color:"var(--yd)",marginBottom:10}}>
              ⚠️ Sets stock directly to your entered value and logs a correction.
            </div>
            <div className="fl">
              <label>Correct Stock To * ({modal.item.unit})</label>
              <input type="number" min="0" placeholder={`Current: ${modal.item.stock}`} value={form.stock} onChange={e=>setForm(f=>({...f,stock:e.target.value}))}/>
              {form.stock!==undefined&&form.stock!==""&&parseInt(form.stock)>=0&&(()=>{const d=disp(modal.item.name,parseInt(form.stock));return d.s?<div className="fh">= {d.s}</div>:null;})()}
            </div>
            <div className="fl"><label>Reason for correction *</label><input type="text" placeholder="e.g. Recount after physical check" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/></div>
            <div className="fl"><label>Manager Name *</label><input type="text" placeholder="Your name" value={form.user} onChange={e=>setForm(f=>({...f,user:e.target.value}))}/></div>
            <div className="ma"><button className="btn bgh" onClick={closeM}>Cancel</button><button className="btn byw" onClick={doMgrStock} disabled={form.stock===undefined||form.stock===""||!form.user||saving}>{saving?"Saving…":"Apply Correction"}</button></div>
          </>}

          {modal.type==="mgrItem"&&<>
            <div className="mt">⚙️ Manager: Edit Item</div>
            <div className="fl"><label>Item Name</label><input type="text" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
            <div className="fl"><label>Alternative / BOL Names</label><input type="text" value={form.alt} onChange={e=>setForm(f=>({...f,alt:e.target.value}))}/></div>
            <div className="fl"><label>Supplier</label><select value={form.supplier} onChange={e=>setForm(f=>({...f,supplier:e.target.value}))}>{SUPS.slice(1).map(s=><option key={s}>{s}</option>)}</select></div>
            <div className="fl"><label>Category</label><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{CATS.slice(1).map(c=><option key={c}>{c}</option>)}</select></div>
            <div className="fl"><label>Unit</label><input type="text" value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value}))}/></div>
            <div className="fl"><label>Low Stock Threshold</label><input type="number" min="1" value={form.threshold} onChange={e=>setForm(f=>({...f,threshold:e.target.value}))}/></div>
            <div className="ma"><button className="btn bgh" onClick={closeM}>Cancel</button><button className="btn byw" onClick={doMgrItem} disabled={!form.name||saving}>{saving?"Saving…":"Save Changes"}</button></div>
          </>}

          {modal.type==="addItem"&&<>
            <div className="mt">➕ Add New Item</div>
            <div className="fl"><label>Item Name *</label><input type="text" placeholder="Official name" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
            <div className="fl"><label>Alt Name / BOL Names</label><input type="text" placeholder="What counter calls it, BOL codes" value={form.alt} onChange={e=>setForm(f=>({...f,alt:e.target.value}))}/></div>
            <div className="fl"><label>Supplier</label><select value={form.supplier} onChange={e=>setForm(f=>({...f,supplier:e.target.value}))}>{SUPS.slice(1).map(s=><option key={s}>{s}</option>)}</select></div>
            <div className="fl"><label>Category</label><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{CATS.slice(1).map(c=><option key={c}>{c}</option>)}</select></div>
            <div className="fl"><label>Unit</label><input type="text" placeholder="pallets, boxes, rolls…" value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value}))}/></div>
            <div className="fl"><label>Low Stock Threshold</label><input type="number" min="1" placeholder="e.g. 10" value={form.threshold} onChange={e=>setForm(f=>({...f,threshold:e.target.value}))}/></div>
            <div className="ma"><button className="btn bgh" onClick={closeM}>Cancel</button><button className="btn bg2" onClick={doAdd} disabled={!form.name||saving}>{saving?"Saving…":"Add Item"}</button></div>
          </>}

          {modal.type==="editThreshold"&&<>
            <div className="mt">⚙️ Set Alert Threshold</div>
            <div className="mp"><strong>{modal.item.name}</strong><div style={{color:"var(--gr)",fontSize:9,marginTop:1}}>Current: {modal.item.threshold} {modal.item.unit}</div></div>
            <div className="fl"><label>New Threshold ({modal.item.unit})</label><input type="number" min="1" placeholder={modal.item.threshold} value={form.threshold} onChange={e=>setForm(f=>({...f,threshold:e.target.value}))}/></div>
            <div style={{fontSize:9,color:"var(--gr)"}}>Alert when stock falls to or below this level.</div>
            <div className="ma"><button className="btn bgh" onClick={closeM}>Cancel</button><button className="btn bg2" onClick={doThresh} disabled={saving}>{saving?"Saving…":"Save"}</button></div>
          </>}
        </div>
      </div>}

      {/* PIN MODAL */}
      {spm&&<div className="ov" onClick={e=>e.target===e.currentTarget&&setSpm(false)}>
        <div className="mo pm">
          <div style={{fontSize:30,marginBottom:7}}>🔐</div>
          <div className="mt" style={{textAlign:"center"}}>Manager Access</div>
          <div style={{fontSize:10,color:"var(--gr)",marginBottom:7}}>Enter your 4-digit PIN</div>
          <div className="pd">
            {[0,1,2,3].map(i=><div key={i} className={`pdot${pi.length>i?" f":""}`} style={pe?{borderColor:"var(--r)",background:"var(--r)"}:{}}></div>)}
          </div>
          {pe&&<div style={{fontSize:10,color:"var(--r)",marginBottom:6}}>Incorrect PIN</div>}
          <div className="pp">
            {['1','2','3','4','5','6','7','8','9','','0','del'].map((k,i)=>(
              k===''?<div key={i}></div>:
              <button key={i} className={`pk${k==='del'?" dl":""}`} onClick={()=>hPinKey(k)}>{k==='del'?'⌫':k}</button>
            ))}
          </div>
          <div style={{marginTop:12}}><button className="btn bgh" style={{width:"100%"}} onClick={()=>setSpm(false)}>Cancel</button></div>
        </div>
      </div>}

      {/* CHANGE PIN MODAL */}
      {scpm&&<div className="ov" onClick={e=>e.target===e.currentTarget&&setScpm(false)}>
        <div className="mo pm">
          <div style={{fontSize:30,marginBottom:7}}>🔑</div>
          <div className="mt" style={{textAlign:"center"}}>Set New PIN</div>
          <div style={{fontSize:10,color:"var(--gr)",marginBottom:7}}>Enter your new 4-digit PIN</div>
          <div className="pd">
            {[0,1,2,3].map(i=><div key={i} className={`pdot${np.length>i?" f":""}`}></div>)}
          </div>
          <div className="pp">
            {['1','2','3','4','5','6','7','8','9','','0','del'].map((k,i)=>(
              k===''?<div key={i}></div>:
              <button key={i} className={`pk${k==='del'?" dl":""}`} onClick={()=>hPinKey(k,true)}>{k==='del'?'⌫':k}</button>
            ))}
          </div>
          <div style={{marginTop:12}}><button className="btn bgh" style={{width:"100%"}} onClick={()=>setScpm(false)}>Cancel</button></div>
        </div>
      </div>}

      {toast&&<div className={`toast t${toast.type==="success"?"s":toast.type==="error"?"e":"w2"}`}>{toast.msg}</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
