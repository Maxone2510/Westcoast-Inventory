const CATS=["All","Boxes & Trays","Bags","Supplies","Labels"];
const SUPS=["All","Crown Packaging","International Paper","Pacty Flexible Packing Solutions","General Fasteners","Technical Adhesives","Uline","Sinclair","Windset Farms","RSS Labels"];

function getSeason(){const n=new Date(),y=n.getFullYear(),s=new Date(y,2,1),e=new Date(y,11,1);if(n>=s&&n<e)return y;return n<s?y-1:y+1;}
function sLbl(y){return`${y} Season (Mar 1 – Dec 1)`;}
function inS(d,y){const dt=new Date(d);return dt>=new Date(y,2,1)&&dt<new Date(y,11,1);}
function fmt(d){return new Date(d).toLocaleDateString("en-CA",{month:"short",day:"numeric",year:"numeric"});}
function pep(c){return c==="Bags"?"🧡":c==="Labels"?"💛":c==="Supplies"?"🌿":"🫑";}

function App(){
  const[items,setItems]=useState([]);
  const[hist,setHist]=useState([]);
  const[bols,setBols]=useState([]);
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState(false);
  const[tab,setTab]=useState("dashboard");
  const[catF,setCatF]=useState("All");
  const[supF,setSupF]=useState("All");
  const[q,setQ]=useState("");
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState({});
  const[yr,setYr]=useState(getSeason());
  const[toast,setToast]=useState(null);
  const[bolProc,setBolProc]=useState(false);
  const[bolRes,setBolRes]=useState(null);
  const[bolFName,setBolFName]=useState("");
  const[bolUser,setBolUser]=useState("");
  const[bolNote,setBolNote]=useState("");
  const[bolQtys,setBolQtys]=useState({});
  const[drag,setDrag]=useState(false);
  const[mBolFile,setMBolFile]=useState(null);
  const[mBolName,setMBolName]=useState("");
  const[mAnalyzing,setMAnalyzing]=useState(false);
  const[mAiRes,setMAiRes]=useState(null);
  const bolRef=useRef();
  const mBolRef=useRef();

  const toast_=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};

  const load=useCallback(async()=>{
    setLoading(true);
    try{
      const[its,txs]=await Promise.all([api("items?order=category,name"),api("transactions?order=date.desc,created_at.desc")]);
      if(Array.isArray(its)&&its.length>0){setItems(its);setHist(txs||[]);}
      else{
        const s=await api("items",{method:"POST",body:JSON.stringify(SEED),prefer:"return=representation"});
        setItems(Array.isArray(s)?s:[]);setHist([]);
      }
    }catch{toast_("Could not connect to database","error");}
    setLoading(false);
  },[]);

  useEffect(()=>{load();},[load]);

  const lowI=items.filter(i=>i.stock>0&&i.stock<=i.threshold);
  const outI=items.filter(i=>i.stock===0);
  const sH=hist.filter(h=>inS(h.date,yr));
  const sR=sH.filter(h=>h.type==="received").reduce((s,h)=>s+h.qty,0);
  const sU=sH.filter(h=>h.type==="used").reduce((s,h)=>s+h.qty,0);

  const filtered=useMemo(()=>items.filter(i=>{
    const ql=q.toLowerCase();
    const m=!ql||i.name.toLowerCase().includes(ql)||(i.alt||"").toLowerCase().includes(ql)||i.supplier.toLowerCase().includes(ql)||i.category.toLowerCase().includes(ql);
    return m&&(catF==="All"||i.category===catF)&&(supF==="All"||i.supplier===supF);
  }),[items,q,catF,supF]);

  const sqty=(id,t)=>sH.filter(h=>h.item_id===id&&h.type===t).reduce((s,h)=>s+h.qty,0);
  const ltx=(id,t)=>{const m=hist.filter(h=>h.item_id===id&&h.type===t);return m.length?m[0]:null;};
  const st=(i)=>i.stock===0?"out":i.stock<=i.threshold?"low":"ok";

  const openM=(type,item=null)=>{setModal({type,item});setForm({qty:"",note:"",user:"",name:"",alt:"",supplier:"Crown Packaging",category:"Bags",unit:"pallets",threshold:5});setMBolFile(null);setMBolName("");setMAiRes(null);};
  const closeM=()=>{setModal(null);setMAiRes(null);};

  const doRecv=async()=>{
    if(!form.qty||!form.user)return;const qty=parseInt(form.qty);setSaving(true);
    try{
      const ns=modal.item.stock+qty;
      await api(`items?id=eq.${modal.item.id}`,{method:"PATCH",body:JSON.stringify({stock:ns}),prefer:"return=minimal"});
      await api("transactions",{method:"POST",body:JSON.stringify({item_id:modal.item.id,type:"received",qty,date:new Date().toISOString().split("T")[0],note:form.note||"Manual entry",username:form.user}),prefer:"return=minimal"});
      setItems(p=>p.map(i=>i.id===modal.item.id?{...i,stock:ns}:i));
      setHist(p=>[{id:Date.now(),item_id:modal.item.id,type:"received",qty,date:new Date().toISOString().split("T")[0],note:form.note||"Manual entry",username:form.user},...p]);
      toast_(`✅ +${qty} ${modal.item.unit} received`);closeM();
    }catch{toast_("Save failed","error");}
    setSaving(false);
  };

  const doUse=async()=>{
    if(!form.qty||!form.user)return;const qty=parseInt(form.qty);
    if(qty>modal.item.stock){toast_("Cannot use more than current stock!","error");return;}
    setSaving(true);
    try{
      const ns=modal.item.stock-qty;
      await api(`items?id=eq.${modal.item.id}`,{method:"PATCH",body:JSON.stringify({stock:ns}),prefer:"return=minimal"});
      await api("transactions",{method:"POST",body:JSON.stringify({item_id:modal.item.id,type:"used",qty,date:new Date().toISOString().split("T")[0],note:form.note||"Manual entry",username:form.user}),prefer:"return=minimal"});
      setItems(p=>p.map(i=>i.id===modal.item.id?{...i,stock:ns}:i));
      setHist(p=>[{id:Date.now(),item_id:modal.item.id,type:"used",qty,date:new Date().toISOString().split("T")[0],note:form.note||"Manual entry",username:form.user},...p]);
      toast_(`📤 ${qty} ${modal.item.unit} usage recorded`);closeM();
    }catch{toast_("Save failed","error");}
    setSaving(false);
  };

  const doAdd=async()=>{
    if(!form.name)return;setSaving(true);
    try{
      const r=await api("items",{method:"POST",body:JSON.stringify({name:form.name,alt:form.alt||"",supplier:form.supplier,category:form.category,unit:form.unit,threshold:parseInt(form.threshold)||5,stock:0})});
      if(Array.isArray(r)&&r[0])setItems(p=>[...p,r[0]]);
      toast_(`✅ ${form.name} added`);closeM();
    }catch{toast_("Save failed","error");}
    setSaving(false);
  };

  const doThresh=async()=>{
    if(!form.threshold)return;setSaving(true);const t=parseInt(form.threshold);
    try{
      await api(`items?id=eq.${modal.item.id}`,{method:"PATCH",body:JSON.stringify({threshold:t}),prefer:"return=minimal"});
      setItems(p=>p.map(i=>i.id===modal.item.id?{...i,threshold:t}:i));
      toast_("Threshold updated");closeM();
    }catch{toast_("Save failed","error");}
    setSaving(false);
  };

  const doMBol=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setMBolFile(file);setMBolName(file.name);setMAnalyzing(true);setMAiRes(null);
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      let content=[];
      if(file.type.startsWith("image/"))content=[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:`Analyze this BOL document. Return ONLY JSON: {"items":[{"name":"...","qty":0,"unit":"..."}],"bolNumber":"...","date":"..."}`}];
      else if(file.type==="application/pdf")content=[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:`Analyze this BOL. Return ONLY JSON: {"items":[{"name":"...","qty":0,"unit":"..."}],"bolNumber":"...","date":"..."}`}];
      if(content.length){
        const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content}]})});
        const data=await resp.json();
        const text=data.content?.map(b=>b.text||"").join("")||"";
        try{const p=JSON.parse(text.replace(/```json|```/g,"").trim());setMAiRes(p);if(p.bolNumber)setForm(f=>({...f,note:`BOL #${p.bolNumber}`}));}
        catch{setMAiRes({error:"Could not parse."});}
      }
    }catch{setMAiRes({error:"Analysis failed."});}
    setMAnalyzing(false);
  };

  const procBol=async(file)=>{
    if(!file)return;setBolFName(file.name);setBolProc(true);setBolRes(null);setBolQtys({});
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
      let content=[];
      const prompt=`Analyze this Bill of Lading for Westcoast Vegetables Ltd., a pepper packaging facility.
Extract ALL items with quantities and units.
Return ONLY valid JSON (no markdown):
{"bolNumber":"...","date":"...","supplier":"...","items":[{"name":"item name as written on document","qty":0,"unit":"boxes/rolls/pallets/cases"}]}`;
      if(file.type.startsWith("image/"))content=[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:prompt}];
      else if(file.type==="application/pdf")content=[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:prompt}];
      if(content.length){
        const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages:[{role:"user",content}]})});
        const data=await resp.json();
        const text=data.content?.map(b=>b.text||"").join("")||"";
        try{
          const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
          const matched=parsed.items.map(bi=>{
            const nl=bi.name.toLowerCase();
            const found=items.find(i=>i.name.toLowerCase().includes(nl.substring(0,8))||nl.includes(i.name.toLowerCase().substring(0,8))||(i.alt&&i.alt.toLowerCase().includes(nl.substring(0,8))));
            return{...bi,matched:found||null};
          });
          setBolRes({...parsed,items:matched});
          const iq={};matched.forEach((it,idx)=>{iq[idx]=it.qty;});setBolQtys(iq);
          if(parsed.bolNumber)setBolNote(`BOL #${parsed.bolNumber}`);
        }catch{setBolRes({error:"Could not read BOL. Please try again."});}
      }else setBolRes({error:"Unsupported file type."});
    }catch{setBolRes({error:"Analysis failed. Please try again."});}
    setBolProc(false);
  };

  const saveBol=async()=>{
    if(!bolUser){toast_("Please enter your name","error");return;}
    if(!bolRes?.items)return;
    setSaving(true);
    const today=new Date().toISOString().split("T")[0];
    let saved=0;
    for(let idx=0;idx<bolRes.items.length;idx++){
      const bi=bolRes.items[idx];if(!bi.matched)continue;
      const qty=parseInt(bolQtys[idx])||0;if(qty<=0)continue;
      try{
        const ns=bi.matched.stock+qty;
        await api(`items?id=eq.${bi.matched.id}`,{method:"PATCH",body:JSON.stringify({stock:ns}),prefer:"return=minimal"});
        await api("transactions",{method:"POST",body:JSON.stringify({item_id:bi.matched.id,type:"received",qty,date:today,note:bolNote||`BOL: ${bolFName}`,username:bolUser}),prefer:"return=minimal"});
        setItems(p=>p.map(i=>i.id===bi.matched.id?{...i,stock:ns}:i));
        setHist(p=>[{id:Date.now()+idx,item_id:bi.matched.id,type:"received",qty,date:today,note:bolNote||`BOL: ${bolFName}`,username:bolUser},...p]);
        saved++;
      }catch{}
    }
    setBols(p=>[{id:Date.now(),fileName:bolFName,note:bolNote,user:bolUser,date:today,itemCount:saved},...p]);
    toast_(`✅ ${saved} items updated from BOL`);
    setBolRes(null);setBolFName("");setBolQtys({});setBolNote("");
    setSaving(false);
  };

  const now=new Date(),sy=new Date(yr,2,1),ey=new Date(yr,11,1);
  const tot=(ey-sy)/86400000,el=Math.max(0,Math.min(tot,(now-sy)/86400000));
  const pct=Math.round((el/tot)*100),isCur=yr===getSeason();

  if(loading)return(
    <div className="lscreen">
      <div style={{fontSize:40}}>🫑🧡💛</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:19,color:"#2d6a2f",fontWeight:700}}>Westcoast Vegetables Ltd.</div>
      <div style={{fontSize:11,color:"#6b7a69"}}>Loading your inventory…</div>
      <div className="lbar"><div className="lfill"></div></div>
    </div>
  );

  const SNav=({c})=>(
    <div style={{display:"flex",gap:5,alignItems:"center"}}>
      <button className="btn btn-ghost btn-sm" onClick={()=>setYr(v=>v-1)}>◀</button>
      <span style={{fontSize:11,fontWeight:600,color:c?"rgba(255,255,255,0.6)":"var(--mid)",minWidth:32,textAlign:"center"}}>{yr}</span>
      <button className="btn btn-ghost btn-sm" onClick={()=>setYr(v=>v+1)}>▶</button>
    </div>
  );

  const Tbl=({items,showT})=>{
    if(!items.length)return <div className="empty"><div style={{fontSize:32,marginBottom:8}}>🔍</div><div>No items match</div></div>;
    return(
      <div className="tbl-wrap">
        <table>
          <thead><tr>
            <th>Item / Alt Name</th><th>Supplier</th><th>Cat.</th><th>Stock</th><th>Total Units</th><th>Season Used</th><th>Last Received</th><th>Last Used</th><th>Status</th><th></th>
          </tr></thead>
          <tbody>{items.map(item=>{
            const s=st(item),su=sqty(item.id,"used"),lr=ltx(item.id,"received"),lu=ltx(item.id,"used");
            const pp=Math.min(100,item.threshold>0?(item.stock/(item.threshold*2))*100:100);
            const d=dual(item.name,item.stock);
            const ps=PS[item.name];
            return <tr key={item.id} className={s==="out"?"or":s==="low"?"lr":""}>
              <td>
                <div className="iname">{pep(item.category)} {item.name}</div>
                {item.alt&&<div className="ialt">↳ {item.alt}</div>}
                {ps&&<div className="ipack">{ps.lbl}</div>}
              </td>
              <td><span className="sbadge">{item.supplier}</span></td>
              <td><span className="cbadge">{item.category}</span></td>
              <td>
                <span className={`snum s${s}`}>{item.stock.toLocaleString()}</span>
                <span style={{fontSize:9,color:"#aaa",marginLeft:2}}>{item.unit}</span>
                <div className="bw"><div className="bf" style={{width:`${pp}%`,background:s==="out"?"var(--red)":s==="low"?"var(--amber)":"var(--green-lt)"}}></div></div>
              </td>
              <td><div className="dual-sec">{d||<span style={{color:"#ddd"}}>—</span>}</div></td>
              <td style={{fontSize:11,color:"var(--amber)",fontWeight:600}}>{su>0?`${su} ${item.unit}`:<span style={{color:"#ccc"}}>—</span>}</td>
              <td style={{fontSize:9}}>{lr?<><div style={{color:"var(--green)",fontWeight:600}}>{fmt(lr.date)}</div><div style={{color:"#bbb"}}>{lr.note}</div></>:<span style={{color:"#ddd"}}>—</span>}</td>
              <td style={{fontSize:9}}>{lu?<><div style={{color:"var(--amber)",fontWeight:600}}>{fmt(lu.date)}</div><div style={{color:"#bbb"}}>{lu.note}</div></>:<span style={{color:"#ddd"}}>—</span>}</td>
              <td><span className={`spill p${s}`}>{s==="out"?"OUT":s==="low"?"LOW":"OK"}</span></td>
              <td><div className="ra">
                <button className="btn btn-green btn-sm" onClick={()=>openM("receive",item)}>+ In</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>openM("use",item)}>− Out</button>
                {showT&&<button className="btn btn-ghost btn-sm" style={{padding:"3px 6px"}} onClick={()=>openM("editThreshold",item)}>⚙️</button>}
              </div></td>
            </tr>;
          })}</tbody>
        </table>
      </div>
    );
  };

  return(
    <div className="app">
      <header className="header no-print">
        <div style={{display:"flex",alignItems:"center",gap:9}}>
          <div className="logo-peppers">🫑🧡💛</div>
          <div><div className="logo-company">Westcoast Vegetables Ltd.</div><div className="logo-sub">Inventory Tracker · A Growing Passion</div></div>
        </div>
        <nav className="nav">
          {[["dashboard","Dashboard"],["inventory","Inventory"],["bol","📄 BOL Scan"],["history","History"],["seasonal","Seasonal"]].map(([k,l])=>(
            <button key={k} className={`nav-btn${tab===k?" active":""}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </nav>
        <div className="hdr-actions">
          <button className="btn btn-ghost btn-sm" onClick={load}>↻</button>
          <button className="btn btn-ghost btn-sm no-print" onClick={()=>window.print()}>🖨</button>
          <button className="btn btn-green btn-sm" onClick={()=>openM("addItem")}>+ Add</button>
        </div>
      </header>

      <div className="content">
        <div className="season-banner no-print">
          <div style={{display:"flex",alignItems:"center",gap:9}}><span style={{fontSize:18}}>🌱</span><div><div className="season-title">{sLbl(yr)}</div><div className="season-dates">Mar 1, {yr} → Dec 1, {yr}</div></div></div>
          <div style={{flex:1,maxWidth:220}}>
            <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",marginBottom:2}}>Season Progress</div>
            <div className="s-prog-bar"><div className="s-prog-fill" style={{width:`${isCur?pct:100}%`}}></div></div>
            <div className="s-pct">{isCur?`${pct}% complete`:"Season complete"}</div>
          </div>
          <div style={{display:"flex",gap:16}}>
            <div><div className="s-val" style={{color:"#7dd87f"}}>{sR.toLocaleString()}</div><div className="s-lbl">Units In</div></div>
            <div><div className="s-val" style={{color:"#e8c53a"}}>{sU.toLocaleString()}</div><div className="s-lbl">Units Used</div></div>
          </div>
          <SNav c/>
        </div>

        {(outI.length>0||lowI.length>0)&&(
          <div className="alerts no-print">
            {outI.length>0&&<div className="alert-row alert-out"><span style={{fontSize:15}}>🚨</span><div><div className="alert-title">Out of Stock — {outI.length} item{outI.length>1?"s":""}</div><div className="chips">{outI.slice(0,10).map(i=><span key={i.id} className="chip chip-red">{pep(i.category)} {i.name}</span>)}{outI.length>10&&<span className="chip chip-red">+{outI.length-10} more</span>}</div></div></div>}
            {lowI.length>0&&<div className="alert-row alert-low"><span style={{fontSize:15}}>⚠️</span><div><div className="alert-title">Low Stock — {lowI.length} item{lowI.length>1?"s":""}</div><div className="chips">{lowI.map(i=><span key={i.id} className="chip chip-amber">{pep(i.category)} {i.name} ({i.stock} left)</span>)}</div></div></div>}
          </div>
        )}

        {tab==="dashboard"&&<>
          <div className="stat-grid">
            <div className="stat-card"><div className="stat-lbl">Total SKUs</div><div className="stat-val">{items.length}</div><div className="stat-sub">All suppliers</div></div>
            <div className="stat-card r"><div className="stat-lbl">Out of Stock</div><div className="stat-val" style={{color:"var(--red)"}}>{outI.length}</div><div className="stat-sub">Need reorder</div></div>
            <div className="stat-card a"><div className="stat-lbl">Low Stock</div><div className="stat-val" style={{color:"var(--amber)"}}>{lowI.length}</div><div className="stat-sub">Near threshold</div></div>
            <div className="stat-card y"><div className="stat-lbl">Season Transactions</div><div className="stat-val" style={{color:"var(--yellow-dk)"}}>{sH.length}</div><div className="stat-sub">{yr} Season</div></div>
          </div>
          <div className="sec-hdr">
            <div className="sec-title">All Inventory</div>
            <div className="filter-row">
              <div className="srch-wrap"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input className="srch" placeholder="Search name, alt name, supplier…" value={q} onChange={e=>setQ(e.target.value)}/></div>
              <select className="filt" value={catF} onChange={e=>setCatF(e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
            </div>
          </div>
          <Tbl items={filtered}/>
        </>}

        {tab==="inventory"&&<>
          <div className="sec-hdr">
            <div className="sec-title">Inventory Management</div>
            <div className="filter-row">
              <div className="srch-wrap"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input className="srch" placeholder="Search name, alt name, supplier…" value={q} onChange={e=>setQ(e.target.value)}/></div>
              <select className="filt" value={catF} onChange={e=>setCatF(e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
              <select className="filt" value={supF} onChange={e=>setSupF(e.target.value)}>{SUPS.map(s=><option key={s}>{s}</option>)}</select>
            </div>
          </div>
          <Tbl items={filtered} showT/>
        </>}

        {tab==="bol"&&<>
          <div className="sec-hdr">
            <div className="sec-title">📄 BOL Scan & Receive</div>
            <span style={{fontSize:11,color:"var(--grey)"}}>Upload a paper scan or email PDF — AI reads all items automatically</span>
          </div>
          <div className="bol-section">
            <div className={`bol-drop${drag?" drag":""}`} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);procBol(e.dataTransfer.files[0]);}} onClick={()=>bolRef.current.click()}>
              <input ref={bolRef} type="file" accept="image/*,.pdf" style={{display:"none"}} onChange={e=>procBol(e.target.files[0])}/>
              {bolProc?(
                <div><div style={{fontSize:28,marginBottom:6}}>🤖</div><div style={{color:"var(--green)",fontWeight:700,fontSize:13}}>AI Reading BOL…</div><div style={{color:"var(--grey)",fontSize:11,marginTop:3}}>Extracting items and quantities</div><div className="lbar" style={{margin:"10px auto 0"}}><div className="lfill"></div></div></div>
              ):(
                <div><div style={{fontSize:28,marginBottom:6}}>📄</div><div style={{color:"var(--green)",fontWeight:700,fontSize:13}}>Drop BOL here or click to upload</div><div style={{color:"var(--grey)",fontSize:11,marginTop:3}}>Photo scans and PDFs supported — paper or email</div>{bolFName&&<div style={{marginTop:7,fontSize:10,color:"var(--green)",fontWeight:600}}>📎 {bolFName}</div>}</div>
              )}
            </div>

            {bolRes&&!bolRes.error&&<>
              <div style={{display:"flex",gap:10,margin:"14px 0",flexWrap:"wrap"}}>
                <div style={{flex:1}}><div style={{fontSize:9,color:"var(--grey)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:3}}>BOL Reference</div><input className="srch" style={{width:"100%"}} placeholder="BOL number or reference" value={bolNote} onChange={e=>setBolNote(e.target.value)}/></div>
                <div style={{flex:1}}><div style={{fontSize:9,color:"var(--grey)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:3}}>Received By *</div><input className="srch" style={{width:"100%"}} placeholder="Your name" value={bolUser} onChange={e=>setBolUser(e.target.value)}/></div>
              </div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:700,color:"var(--dark)",marginBottom:8}}>
                🤖 Found {bolRes.items?.length} items{bolRes.bolNumber&&<span style={{fontFamily:"'Source Sans 3'",fontSize:10,fontWeight:400,color:"var(--grey)",marginLeft:6}}>BOL #{bolRes.bolNumber}</span>}
              </div>
              <div className="bol-results-box">
                {bolRes.items?.map((bi,idx)=>(
                  <div key={idx} className="bol-row">
                    <div style={{flex:2}}>
                      <div className="bol-match-name">{bi.name}</div>
                      {bi.matched?<div className="bol-ok">✅ → {bi.matched.name}</div>:<div className="bol-no">⚠️ No match — will skip</div>}
                    </div>
                    <div style={{flex:1,fontSize:10,color:"var(--grey)"}}>
                      {bi.matched&&<><div>Now: <strong style={{color:"var(--dark)"}}>{bi.matched.stock} {bi.matched.unit}</strong></div>{dual(bi.matched.name,bi.matched.stock)&&<div style={{color:"var(--green)",fontSize:9}}>{dual(bi.matched.name,bi.matched.stock)}</div>}</>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{fontSize:10,color:"var(--grey)"}}>Qty:</span>
                      <input className="bol-qty" type="number" min="0" value={bolQtys[idx]||""} onChange={e=>setBolQtys(p=>({...p,[idx]:e.target.value}))} disabled={!bi.matched} style={{opacity:bi.matched?1:0.3}}/>
                      <span style={{fontSize:9,color:"var(--grey)"}}>{bi.unit}</span>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"flex-end"}}>
                <button className="btn btn-ghost" onClick={()=>{setBolRes(null);setBolFName("");}}>Clear</button>
                <button className="btn btn-green" onClick={saveBol} disabled={saving||!bolUser}>{saving?"Saving…":"✅ Save to Inventory"}</button>
              </div>
            </>}
            {bolRes?.error&&<div style={{padding:"14px",background:"var(--red-bg)",border:"1px solid rgba(192,57,43,0.2)",borderRadius:7,color:"var(--red)",fontSize:12,marginTop:10}}>⚠️ {bolRes.error}</div>}
          </div>

          {bols.length>0&&<>
            <div className="sec-title" style={{marginBottom:10}}>Saved BOLs This Session</div>
            <div className="bol-saved">{bols.map(b=><div key={b.id} className="bol-si"><span style={{fontSize:18}}>📄</span><div style={{flex:1}}><div style={{fontWeight:600,fontSize:12}}>{b.note||b.fileName}</div><div style={{fontSize:9,color:"var(--grey)"}}>{fmt(b.date)} · {b.user}</div></div><div style={{fontSize:11,color:"var(--green)",fontWeight:600}}>{b.itemCount} items updated</div></div>)}</div>
          </>}
        </>}

        {tab==="history"&&<>
          <div className="sec-hdr"><div className="sec-title">Transaction History</div><SNav/></div>
          {sH.length===0?<div className="empty"><div style={{fontSize:32,marginBottom:8}}>📋</div><div>No transactions for {yr} season</div></div>
          :<div className="hl">{[...sH].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(h=>{
            const item=items.find(i=>i.id===h.item_id);
            return <div key={h.id} className={`hi ${h.type}`}>
              <span className={`hbadge ${h.type==="received"?"hbr":"hbu"}`}>{h.type==="received"?"IN":"OUT"}</span>
              <div className="hinfo"><div className="hname">{item?.name||"Unknown"}</div><div className="hnote">{h.note} · {h.username}</div></div>
              <div className="hright"><div className="hqty" style={{color:h.type==="received"?"var(--green)":"var(--amber)"}}>{h.type==="received"?"+":"-"}{h.qty} <span style={{fontSize:9,fontWeight:400,color:"#aaa"}}>{item?.unit}</span></div><div className="hdate">{fmt(h.date)}</div></div>
            </div>;
          })}</div>}
        </>}

        {tab==="seasonal"&&<>
          <div className="sec-hdr">
            <div className="sec-title">Seasonal Usage Report</div>
            <div className="filter-row">
              <select className="filt" value={catF} onChange={e=>setCatF(e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
              <SNav/>
              <button className="btn btn-ghost btn-sm no-print" onClick={()=>window.print()}>🖨 Print</button>
            </div>
          </div>
          <div style={{marginBottom:12,padding:"9px 14px",background:"var(--white)",border:"1px solid var(--border)",borderRadius:9,display:"flex",gap:22,flexWrap:"wrap"}}>
            {[["Total Received",sR,"var(--green)"],["Total Used",sU,"var(--amber)"],["Net Balance",sR-sU,"var(--dark)"],["Transactions",sH.length,"var(--grey)"]].map(([l,v,c])=>(
              <div key={l}><div style={{fontSize:8,color:"var(--grey)",textTransform:"uppercase",letterSpacing:"0.5px",fontWeight:700}}>{l}</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:c}}>{v.toLocaleString()}</div></div>
            ))}
          </div>
          {(catF==="All"?CATS.slice(1):[catF]).map(cat=>{
            const ci=items.filter(i=>i.category===cat);
            const ac=ci.filter(i=>sqty(i.id,"received")>0||sqty(i.id,"used")>0);
            return <div key={cat} style={{marginBottom:20}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:700,color:"var(--dark)",marginBottom:7,paddingBottom:4,borderBottom:"2px solid var(--green-bg)"}}>{pep(cat)} {cat}</div>
              {ac.length===0?<div style={{fontSize:11,color:"var(--grey)",fontStyle:"italic",padding:"5px 0"}}>No activity this season</div>
              :<div className="sgrid">{ac.map(item=>{
                const recv=sqty(item.id,"received"),used=sqty(item.id,"used"),lr=ltx(item.id,"received"),lu=ltx(item.id,"used");
                const d=dual(item.name,item.stock);
                return <div key={item.id} className="scard">
                  <div className="sn">{item.name}</div>
                  {item.alt&&<div className="sa">{item.alt}</div>}
                  <div style={{fontSize:8,color:"var(--grey)",marginTop:2}}>{item.supplier}</div>
                  {d&&<div style={{fontSize:9,color:"var(--green)",fontWeight:600,marginTop:2}}>{item.stock} {item.unit} = {d}</div>}
                  <div className="ss">
                    <div><div className="sv" style={{color:"var(--green)"}}>{recv}</div><div className="sl">Received</div>{lr&&<div style={{fontSize:8,color:"#aaa",marginTop:1}}>Last: {fmt(lr.date)}</div>}</div>
                    <div><div className="sv" style={{color:"var(--amber)"}}>{used}</div><div className="sl">Used</div>{lu&&<div style={{fontSize:8,color:"#aaa",marginTop:1}}>Last: {fmt(lu.date)}</div>}</div>
                    <div><div className="sv" style={{color:"var(--dark)"}}>{item.stock}</div><div className="sl">On Hand</div></div>
                  </div>
                </div>;
              })}</div>}
            </div>;
          })}
        </>}
      </div>

      {modal&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&closeM()}>
        <div className="modal">
          {modal.type==="receive"&&<>
            <div className="modal-title">📥 Receive Inventory</div>
            <div className="mpill">
              <strong>{modal.item.name}</strong>
              {modal.item.alt&&<div style={{fontStyle:"italic",color:"var(--grey)",fontSize:10,marginTop:1}}>Also known as: {modal.item.alt}</div>}
              <div style={{color:"var(--grey)",fontSize:10,marginTop:1}}>Supplier: {modal.item.supplier}</div>
              <div className="mpill-dual">Current: {modal.item.stock} {modal.item.unit}{dual(modal.item.name,modal.item.stock)?` = ${dual(modal.item.name,modal.item.stock)}`:""}</div>
              {PS[modal.item.name]&&<div style={{fontSize:9,color:"#bbb",marginTop:1}}>{PS[modal.item.name].lbl}</div>}
            </div>
            <div className="field">
              <label>Upload BOL (optional)</label>
              {!mBolFile?<div className="bol-drop" style={{padding:12}} onClick={()=>mBolRef.current.click()}><input ref={mBolRef} type="file" accept="image/*,.pdf" style={{display:"none"}} onChange={doMBol}/><div style={{fontSize:18,marginBottom:3}}>📄</div><div style={{color:"var(--green)",fontWeight:700,fontSize:11}}>Upload BOL</div></div>
              :<div style={{background:"rgba(45,106,47,0.07)",border:"1px solid rgba(45,106,47,0.2)",borderRadius:7,padding:"8px 12px",display:"flex",alignItems:"center",gap:7,fontSize:11,color:"var(--green)"}}>
                <span>✅</span><div style={{flex:1}}><div style={{fontWeight:600}}>{mBolName}</div>{mAnalyzing&&<div style={{color:"var(--amber)",fontSize:10}}>🤖 Analyzing…</div>}</div>
                <button className="btn btn-ghost btn-sm" onClick={()=>{setMBolFile(null);setMBolName("");setMAiRes(null);}}>✕</button>
              </div>}
              {mAiRes&&!mAiRes.error&&<div style={{background:"var(--green-bg)",border:"1px solid var(--border)",borderRadius:7,padding:"9px 12px",marginTop:7}}>
                <div style={{fontSize:8,fontWeight:700,color:"var(--green)",letterSpacing:"0.7px",textTransform:"uppercase",marginBottom:5}}>🤖 Extracted from BOL</div>
                {mAiRes.items?.map((it,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",borderBottom:"1px solid var(--border)",fontSize:10}}><span>{it.name}</span><span style={{fontWeight:700,color:"var(--green)"}}>{it.qty} {it.unit}</span></div>)}
              </div>}
            </div>
            <div className="field">
              <label>Quantity Received * ({modal.item.unit})</label>
              <input type="number" min="1" placeholder={`How many ${modal.item.unit}?`} value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))}/>
              {form.qty&&parseInt(form.qty)>0&&dual(modal.item.name,parseInt(form.qty))&&<div className="fhint">= {dual(modal.item.name,parseInt(form.qty))}</div>}
            </div>
            <div className="field"><label>BOL / Reference Note</label><input type="text" placeholder="e.g. BOL #7890" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/></div>
            <div className="field"><label>Received By *</label><input type="text" placeholder="Your name" value={form.user} onChange={e=>setForm(f=>({...f,user:e.target.value}))}/></div>
            <div className="mactions"><button className="btn btn-ghost" onClick={closeM}>Cancel</button><button className="btn btn-green" onClick={doRecv} disabled={!form.qty||!form.user||saving}>{saving?"Saving…":"Confirm Receipt"}</button></div>
          </>}

          {modal.type==="use"&&<>
            <div className="modal-title">📤 Record Usage</div>
            <div className="mpill">
              <strong>{modal.item.name}</strong>
              {modal.item.alt&&<div style={{fontStyle:"italic",color:"var(--grey)",fontSize:10,marginTop:1}}>Also known as: {modal.item.alt}</div>}
              <div className="mpill-dual">Stock: {modal.item.stock} {modal.item.unit}{dual(modal.item.name,modal.item.stock)?` = ${dual(modal.item.name,modal.item.stock)}`:""}</div>
              <div style={{color:"var(--grey)",fontSize:10,marginTop:1}}>Season used: {sqty(modal.item.id,"used")} {modal.item.unit}</div>
            </div>
            <div className="field">
              <label>Quantity Used * ({modal.item.unit})</label>
              <input type="number" min="1" max={modal.item.stock} placeholder="e.g. 5" value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))}/>
              {form.qty&&parseInt(form.qty)>0&&dual(modal.item.name,parseInt(form.qty))&&<div className="fhint">= {dual(modal.item.name,parseInt(form.qty))}</div>}
            </div>
            <div className="field"><label>Reason / Line</label><input type="text" placeholder="e.g. Line 2 production run" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/></div>
            <div className="field"><label>Entered By *</label><input type="text" placeholder="Your name" value={form.user} onChange={e=>setForm(f=>({...f,user:e.target.value}))}/></div>
            <div className="mactions"><button className="btn btn-ghost" onClick={closeM}>Cancel</button><button className="btn btn-danger" onClick={doUse} disabled={!form.qty||!form.user||saving}>{saving?"Saving…":"Record Usage"}</button></div>
          </>}

          {modal.type==="addItem"&&<>
            <div className="modal-title">➕ Add New Item</div>
            <div className="field"><label>Item Name *</label><input type="text" placeholder="Official name" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
            <div className="field"><label>Alternative Name</label><input type="text" placeholder="What your counter calls it" value={form.alt} onChange={e=>setForm(f=>({...f,alt:e.target.value}))}/></div>
            <div className="field"><label>Supplier</label><select value={form.supplier} onChange={e=>setForm(f=>({...f,supplier:e.target.value}))}>{SUPS.slice(1).map(s=><option key={s}>{s}</option>)}</select></div>
            <div className="field"><label>Category</label><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{CATS.slice(1).map(c=><option key={c}>{c}</option>)}</select></div>
            <div className="field"><label>Unit</label><input type="text" placeholder="pallets, boxes, rolls…" value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value}))}/></div>
            <div className="field"><label>Low Stock Threshold</label><input type="number" min="1" placeholder="e.g. 10" value={form.threshold} onChange={e=>setForm(f=>({...f,threshold:e.target.value}))}/></div>
            <div className="mactions"><button className="btn btn-ghost" onClick={closeM}>Cancel</button><button className="btn btn-green" onClick={doAdd} disabled={!form.name||saving}>{saving?"Saving…":"Add Item"}</button></div>
          </>}

          {modal.type==="editThreshold"&&<>
            <div className="modal-title">⚙️ Set Alert Threshold</div>
            <div className="mpill"><strong>{modal.item.name}</strong><div style={{color:"var(--grey)",fontSize:10,marginTop:1}}>Current: {modal.item.threshold} {modal.item.unit}</div></div>
            <div className="field"><label>New Threshold ({modal.item.unit})</label><input type="number" min="1" placeholder={modal.item.threshold} value={form.threshold} onChange={e=>setForm(f=>({...f,threshold:e.target.value}))}/></div>
            <div style={{fontSize:10,color:"var(--grey)"}}>Alert when stock falls to or below this level.</div>
            <div className="mactions"><button className="btn btn-ghost" onClick={closeM}>Cancel</button><button className="btn btn-green" onClick={doThresh} disabled={saving}>{saving?"Saving…":"Save"}</button></div>
          </>}
        </div>
      </div>}

      {toast&&<div className={`toast toast-${toast.type}`}>{toast.msg}</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
