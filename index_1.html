.btn-sm{padding:5px 11px;font-size:12px;}

.toast-error{background:var(--red);color:#fff;}

.empty-icon{font-size:40px;margin-bottom:12px;}

  .season-banner{background:white!important;border:1px solid #ccc;}

const SUPS=["All","Crown Packaging","International Paper","Pacty Flexible Packing Solutions","General Fasteners","Technical Adhesives","Uline","Sinclair","Windset Farms","RSS Labels"];
function getSeason(){const n=new Date(),y=n.getFullYear(),s=new Date(y,2,1),e=new Date(y,11,1);if(n>=s&&n<e)return y;return n<s?y-1:y+1;}
function sLabel(y){return `${y} Season (Mar 1 – Dec 1)`;}
function inSeason(d,y){const dt=new Date(d);return dt>=new Date(y,2,1)&&dt<new Date(y,11,1);}
function fmt(d){return new Date(d).toLocaleDateString("en-CA",{month:"short",day:"numeric",year:"numeric"});}
function pep(cat){return cat==="Bags"?"🧡":cat==="Labels"?"💛":cat==="Supplies"?"🌿":"🫑";}

function App(){
  const[items,setItems]=useState([]);
  const[history,setHistory]=useState([]);
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState(false);
  const[tab,setTab]=useState("dashboard");
  const[catF,setCatF]=useState("All");
  const[supF,setSupF]=useState("All");
  const[q,setQ]=useState("");
  const[modal,setModal]=useState(null);
  const[form,setForm]=useState({});
  const[bolFile,setBolFile]=useState(null);
  const[bolName,setBolName]=useState("");
  const[analyzing,setAnalyzing]=useState(false);
  const[aiRes,setAiRes]=useState(null);
  const[yr,setYr]=useState(getSeason());
  const[toast,setToast]=useState(null);
  const fileRef=useRef();

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};

  const load=useCallback(async()=>{
    setLoading(true);
    try{
      const[its,txs]=await Promise.all([api("items?order=category,name"),api("transactions?order=date.desc,created_at.desc")]);
      if(Array.isArray(its)&&its.length>0){setItems(its);setHistory(txs||[]);}
      else{const s=await api("items",{method:"POST",body:JSON.stringify(SEED),prefer:"return=representation"});setItems(Array.isArray(s)?s:[]);setHistory([]);}
    }catch{showToast("Could not connect to database","error");}
    setLoading(false);
  },[]);

  useEffect(()=>{load();},[load]);

  const lowI=items.filter(i=>i.stock>0&&i.stock<=i.threshold);
  const outI=items.filter(i=>i.stock===0);
  const sHist=history.filter(h=>inSeason(h.date,yr));
  const sRecv=sHist.filter(h=>h.type==="received").reduce((s,h)=>s+h.qty,0);
  const sUsed=sHist.filter(h=>h.type==="used").reduce((s,h)=>s+h.qty,0);

  const filtered=useMemo(()=>items.filter(i=>{
    const ql=q.toLowerCase();
    const m=!ql||i.name.toLowerCase().includes(ql)||(i.alt||"").toLowerCase().includes(ql)||i.supplier.toLowerCase().includes(ql)||i.category.toLowerCase().includes(ql);
    return m&&(catF==="All"||i.category===catF)&&(supF==="All"||i.supplier===supF);
  }),[items,q,catF,supF]);

  const sqty=(id,type)=>sHist.filter(h=>h.item_id===id&&h.type===type).reduce((s,h)=>s+h.qty,0);
  const ltx=(id,type)=>{const m=history.filter(h=>h.item_id===id&&h.type===type);return m.length?m[0]:null;};
  const st=(i)=>i.stock===0?"out":i.stock<=i.threshold?"low":"ok";

  const openM=(type,item=null)=>{setModal({type,item});setForm({qty:"",note:"",user:"",name:"",alt:"",supplier:"Crown Packaging",category:"Bags",unit:"cases",threshold:5});setBolFile(null);setBolName("");setAiRes(null);};
  const closeM=()=>{setModal(null);setAiRes(null);};

  const doRecv=async()=>{
    if(!form.qty||!form.user)return;const qty=parseInt(form.qty);setSaving(true);
    try{
      const ns=modal.item.stock+qty;
      await api(`items?id=eq.${modal.item.id}`,{method:"PATCH",body:JSON.stringify({stock:ns}),prefer:"return=minimal"});
      await api("transactions",{method:"POST",body:JSON.stringify({item_id:modal.item.id,type:"received",qty,date:new Date().toISOString().split("T")[0],note:form.note||(bolName?`BOL: ${bolName}`:"Manual entry"),username:form.user}),prefer:"return=minimal"});
      setItems(p=>p.map(i=>i.id===modal.item.id?{...i,stock:ns}:i));
      setHistory(p=>[{id:Date.now(),item_id:modal.item.id,type:"received",qty,date:new Date().toISOString().split("T")[0],note:form.note||(bolName?`BOL: ${bolName}`:"Manual entry"),username:form.user},...p]);
      showToast(`✅ +${qty} ${modal.item.unit} received`);closeM();
    }catch{showToast("Save failed","error");}
    setSaving(false);
  };

  const doUse=async()=>{
    if(!form.qty||!form.user)return;const qty=parseInt(form.qty);
    if(qty>modal.item.stock){showToast("Cannot use more than current stock!","error");return;}
    setSaving(true);
    try{
      const ns=modal.item.stock-qty;
      await api(`items?id=eq.${modal.item.id}`,{method:"PATCH",body:JSON.stringify({stock:ns}),prefer:"return=minimal"});
      await api("transactions",{method:"POST",body:JSON.stringify({item_id:modal.item.id,type:"used",qty,date:new Date().toISOString().split("T")[0],note:form.note||"Manual entry",username:form.user}),prefer:"return=minimal"});
      setItems(p=>p.map(i=>i.id===modal.item.id?{...i,stock:ns}:i));
      setHistory(p=>[{id:Date.now(),item_id:modal.item.id,type:"used",qty,date:new Date().toISOString().split("T")[0],note:form.note||"Manual entry",username:form.user},...p]);
      showToast(`📤 ${qty} ${modal.item.unit} usage recorded`);closeM();
    }catch{showToast("Save failed","error");}
    setSaving(false);
  };

  const doAdd=async()=>{
    if(!form.name)return;setSaving(true);
    try{
      const r=await api("items",{method:"POST",body:JSON.stringify({name:form.name,alt:form.alt||"",supplier:form.supplier,category:form.category,unit:form.unit,threshold:parseInt(form.threshold)||5,stock:0})});
      if(Array.isArray(r)&&r[0])setItems(p=>[...p,r[0]]);
      showToast(`✅ ${form.name} added`);closeM();
    }catch{showToast("Save failed","error");}
    setSaving(false);
  };

  const doThresh=async()=>{
    if(!form.threshold)return;setSaving(true);const t=parseInt(form.threshold);
    try{
      await api(`items?id=eq.${modal.item.id}`,{method:"PATCH",body:JSON.stringify({threshold:t}),prefer:"return=minimal"});
      setItems(p=>p.map(i=>i.id===modal.item.id?{...i,threshold:t}:i));
      showToast("Threshold updated");closeM();
    }catch{showToast("Save failed","error");}
    setSaving(false);
  };

  const doBOL=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setBolFile(file);setBolName(file.name);setAnalyzing(true);setAiRes(null);
    try{
      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej();r.readAsDataURL(file);});
      const isImg=file.type.startsWith("image/"),isPdf=file.type==="application/pdf";
      let content=[];
      if(isImg)content=[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:`Analyze this Bill of Lading. Extract items, quantities, units. Return ONLY JSON: {"items":[{"name":"...","qty":0,"unit":"..."}],"bolNumber":"...","date":"..."}`}];
      else if(isPdf)content=[{type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}},{type:"text",text:`Analyze this Bill of Lading. Return ONLY JSON: {"items":[{"name":"...","qty":0,"unit":"..."}],"bolNumber":"...","date":"..."}`}];
      if(content.length){
        const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content}]})});
        const data=await resp.json();
        const text=data.content?.map(b=>b.text||"").join("")||"";
        try{const p=JSON.parse(text.replace(/```json|```/g,"").trim());setAiRes(p);if(p.bolNumber)setForm(f=>({...f,note:`BOL #${p.bolNumber}`}));}
        catch{setAiRes({error:"Could not parse. Fill in manually."});}
      }else setAiRes({error:"Unsupported file type."});
    }catch{setAiRes({error:"Analysis failed. Fill in manually."});}
    setAnalyzing(false);
  };

  const now=new Date(),sy=new Date(yr,2,1),ey=new Date(yr,11,1);
  const tot=(ey-sy)/86400000,el=Math.max(0,Math.min(tot,(now-sy)/86400000));
  const pct=Math.round((el/tot)*100),isCur=yr===getSeason();

  if(loading)return(
    <div className="loading-screen">
      <div style={{fontSize:48}}>🫑🧡💛</div>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#2d6a2f",fontWeight:700}}>Westcoast Vegetables Ltd.</div>
      <div style={{fontSize:13,color:"#6b7a69"}}>Connecting to database…</div>
      <div className="load-bar"><div className="load-fill"></div></div>
    </div>
  );

  const SeasonNav=()=>(
    <div style={{display:"flex",gap:6,alignItems:"center"}}>
      <button className="btn btn-ghost btn-sm" onClick={()=>setYr(v=>v-1)}>◀</button>
      <span style={{fontSize:13,fontWeight:600,color:"var(--mid)",minWidth:36,textAlign:"center"}}>{yr}</span>
      <button className="btn btn-ghost btn-sm" onClick={()=>setYr(v=>v+1)}>▶</button>
    </div>
  );

  const InvTable=({items,showThresh})=>{
    if(!items.length)return <div className="empty"><div className="empty-icon">🔍</div><div>No items match your search</div></div>;
    return(
      <div className="tbl-wrap">
        <table>
          <thead><tr>
            <th>Item / Alt Name</th><th>Supplier</th><th>Cat.</th><th>Stock</th><th>Season Used</th><th>Last Received</th><th>Last Used</th><th>Status</th><th></th>
          </tr></thead>
          <tbody>{items.map(item=>{
            const s=st(item),su=sqty(item.id,"used"),lr=ltx(item.id,"received"),lu=ltx(item.id,"used");
            const pp=Math.min(100,item.threshold>0?(item.stock/(item.threshold*2))*100:100);
            return <tr key={item.id} className={s==="out"?"out-row":s==="low"?"low-row":""}>
              <td><div className="item-name">{pep(item.category)} {item.name}</div>{item.alt&&<div className="item-alt">↳ {item.alt}</div>}</td>
              <td><span className="supplier-badge">{item.supplier}</span></td>
              <td><span className="cat-badge">{item.category}</span></td>
              <td><span className={`stock-num stock-${s}`}>{item.stock}</span><span style={{fontSize:10,color:"#aaa",marginLeft:3}}>{item.unit}</span><div className="bar-wrap"><div className="bar-fill" style={{width:`${pp}%`,background:s==="out"?"var(--red)":s==="low"?"var(--amber)":"var(--green-lt)"}}></div></div></td>
              <td style={{fontSize:13,color:"var(--amber)",fontWeight:600}}>{su>0?`${su} ${item.unit}`:<span style={{color:"#ccc"}}>—</span>}</td>
              <td style={{fontSize:11}}>{lr?<><div style={{color:"var(--green)",fontWeight:600}}>{fmt(lr.date)}</div><div style={{color:"#bbb",fontSize:10}}>{lr.note}</div></>:<span style={{color:"#ddd"}}>—</span>}</td>
              <td style={{fontSize:11}}>{lu?<><div style={{color:"var(--amber)",fontWeight:600}}>{fmt(lu.date)}</div><div style={{color:"#bbb",fontSize:10}}>{lu.note}</div></>:<span style={{color:"#ddd"}}>—</span>}</td>
              <td><span className={`status-pill pill-${s}`}>{s==="out"?"OUT":s==="low"?"LOW":"OK"}</span></td>
              <td><div className="row-actions">
                <button className="btn btn-green btn-sm" onClick={()=>openM("receive",item)}>+ In</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>openM("use",item)}>− Out</button>
                {showThresh&&<button className="btn btn-ghost btn-sm" style={{padding:"5px 8px"}} onClick={()=>openM("editThreshold",item)}>⚙️</button>}
              </div></td>
            </tr>;
          })}</tbody>
        </table>
      </div>
    );
  };

  return(
    <div className="app">
      <header className="header no-print">
        <div className="logo-area">
          <div className="logo-peppers">🫑🧡💛</div>
          <div>
            <div className="logo-company">Westcoast Vegetables Ltd.</div>
            <div className="logo-sub">Inventory Tracker · A Growing Passion</div>
          </div>
        </div>
        <nav className="nav">
          {[["dashboard","Dashboard"],["inventory","Inventory"],["history","History"],["seasonal","Seasonal"]].map(([k,l])=>(
            <button key={k} className={`nav-btn${tab===k?" active":""}`} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </nav>
        <div className="hdr-actions">
          <button className="btn btn-ghost btn-sm" onClick={load}>↻ Refresh</button>
          <button className="btn btn-ghost btn-sm no-print" onClick={()=>window.print()}>🖨 Print</button>
          <button className="btn btn-green btn-sm" onClick={()=>openM("addItem")}>+ Add Item</button>
        </div>
      </header>

      <div className="content">
        <div className="season-banner no-print">
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:24}}>🌱</span>
            <div><div className="season-title">{sLabel(yr)}</div><div className="season-dates">Mar 1, {yr} → Dec 1, {yr}</div></div>
          </div>
          <div style={{flex:1,maxWidth:260}}>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",marginBottom:2}}>Season Progress</div>
            <div className="season-prog-bar"><div className="season-prog-fill" style={{width:`${isCur?pct:100}%`}}></div></div>
            <div className="season-pct">{isCur?`${pct}% complete`:"Season complete"}</div>
          </div>
          <div style={{display:"flex",gap:20}}>
            <div><div className="s-stat-val" style={{color:"#7dd87f"}}>{sRecv.toLocaleString()}</div><div className="s-stat-lbl">Units In</div></div>
            <div><div className="s-stat-val" style={{color:"#e8c53a"}}>{sUsed.toLocaleString()}</div><div className="s-stat-lbl">Units Used</div></div>
          </div>
          <SeasonNav/>
        </div>

        {(outI.length>0||lowI.length>0)&&(
          <div className="alerts no-print">
            {outI.length>0&&<div className="alert-row alert-out"><span style={{fontSize:18}}>🚨</span><div><div className="alert-title">Out of Stock — {outI.length} item{outI.length>1?"s":""}</div><div className="chips">{outI.slice(0,10).map(i=><span key={i.id} className="chip chip-red">{pep(i.category)} {i.name}</span>)}{outI.length>10&&<span className="chip chip-red">+{outI.length-10} more</span>}</div></div></div>}
            {lowI.length>0&&<div className="alert-row alert-low"><span style={{fontSize:18}}>⚠️</span><div><div className="alert-title">Low Stock — {lowI.length} item{lowI.length>1?"s":""}</div><div className="chips">{lowI.map(i=><span key={i.id} className="chip chip-amber">{pep(i.category)} {i.name} ({i.stock} left)</span>)}</div></div></div>}
          </div>
        )}

        {tab==="dashboard"&&<>
          <div className="stat-grid">
            <div className="stat-card"><div className="stat-lbl">Total SKUs</div><div className="stat-val">{items.length}</div><div className="stat-sub">All suppliers</div></div>
            <div className="stat-card red-top"><div className="stat-lbl">Out of Stock</div><div className="stat-val" style={{color:"var(--red)"}}>{outI.length}</div><div className="stat-sub">Need reorder</div></div>
            <div className="stat-card amber-top"><div className="stat-lbl">Low Stock</div><div className="stat-val" style={{color:"var(--amber)"}}>{lowI.length}</div><div className="stat-sub">Near threshold</div></div>
            <div className="stat-card yellow-top"><div className="stat-lbl">Season Transactions</div><div className="stat-val" style={{color:"var(--yellow-dk)"}}>{sHist.length}</div><div className="stat-sub">{yr} Season</div></div>
          </div>
          <div className="sec-header">
            <div className="sec-title">All Inventory</div>
            <div className="filter-row">
              <div className="search-wrap">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input className="search-input" placeholder="Search name, alt name, supplier…" value={q} onChange={e=>setQ(e.target.value)}/>
              </div>
              <select className="filt" value={catF} onChange={e=>setCatF(e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
            </div>
          </div>
          <InvTable items={filtered}/>
        </>}

        {tab==="inventory"&&<>
          <div className="sec-header">
            <div className="sec-title">Inventory Management</div>
            <div className="filter-row">
              <div className="search-wrap">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input className="search-input" placeholder="Search name, alt name, supplier…" value={q} onChange={e=>setQ(e.target.value)}/>
              </div>
              <select className="filt" value={catF} onChange={e=>setCatF(e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
              <select className="filt" value={supF} onChange={e=>setSupF(e.target.value)}>{SUPS.map(s=><option key={s}>{s}</option>)}</select>
            </div>
          </div>
          <InvTable items={filtered} showThresh/>
        </>}

        {tab==="history"&&<>
          <div className="sec-header">
            <div className="sec-title">Transaction History</div>
            <SeasonNav/>
          </div>
          {sHist.length===0
            ?<div className="empty"><div className="empty-icon">📋</div><div>No transactions for {yr} season</div></div>
            :<div className="hist-list">{[...sHist].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(h=>{
              const item=items.find(i=>i.id===h.item_id);
              return <div key={h.id} className={`hist-item ${h.type}`}>
                <span className={`hist-badge ${h.type==="received"?"recv-badge":"used-badge"}`}>{h.type==="received"?"IN":"OUT"}</span>
                <div className="hist-info"><div className="hist-name">{item?.name||"Unknown"}</div><div className="hist-note">{h.note} · {h.username}</div></div>
                <div className="hist-right">
                  <div className="hist-qty" style={{color:h.type==="received"?"var(--green)":"var(--amber)"}}>{h.type==="received"?"+":"-"}{h.qty} <span style={{fontSize:11,fontWeight:400,color:"#aaa"}}>{item?.unit}</span></div>
                  <div className="hist-date">{fmt(h.date)}</div>
                </div>
              </div>;
            })}</div>}
        </>}

        {tab==="seasonal"&&<>
          <div className="sec-header">
            <div className="sec-title">Seasonal Usage Report</div>
            <div className="filter-row">
              <select className="filt" value={catF} onChange={e=>setCatF(e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select>
              <SeasonNav/>
              <button className="btn btn-ghost btn-sm no-print" onClick={()=>window.print()}>🖨 Print</button>
            </div>
          </div>
          <div style={{marginBottom:16,padding:"12px 18px",background:"var(--white)",border:"1px solid var(--border)",borderRadius:10,display:"flex",gap:28,flexWrap:"wrap"}}>
            {[["Total Received",sRecv,"var(--green)"],["Total Used",sUsed,"var(--amber)"],["Net Balance",sRecv-sUsed,"var(--dark)"],["Transactions",sHist.length,"var(--grey)"]].map(([l,v,c])=>(
              <div key={l}><div style={{fontSize:10,color:"var(--grey)",textTransform:"uppercase",letterSpacing:"0.6px",fontWeight:700}}>{l}</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,color:c}}>{v.toLocaleString()}</div></div>
            ))}
          </div>
          {(catF==="All"?CATS.slice(1):[catF]).map(cat=>{
            const ci=items.filter(i=>i.category===cat);
            const ac=ci.filter(i=>sqty(i.id,"received")>0||sqty(i.id,"used")>0);
            return <div key={cat} style={{marginBottom:24}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:"var(--dark)",marginBottom:10,paddingBottom:6,borderBottom:"2px solid var(--green-bg)"}}>{pep(cat)} {cat}</div>
              {ac.length===0?<div style={{fontSize:13,color:"var(--grey)",fontStyle:"italic",padding:"8px 0"}}>No activity this season</div>
              :<div className="season-grid">{ac.map(item=>{
                const recv=sqty(item.id,"received"),used=sqty(item.id,"used"),lr=ltx(item.id,"received"),lu=ltx(item.id,"used");
                return <div key={item.id} className="season-item-card">
                  <div className="si-name">{item.name}</div>
                  {item.alt&&<div className="si-alt">{item.alt}</div>}
                  <div style={{fontSize:10,color:"var(--grey)",marginTop:4}}>{item.supplier}</div>
                  <div className="si-stats">
                    <div><div className="si-stat-val" style={{color:"var(--green)"}}>{recv}</div><div className="si-stat-lbl">Received</div>{lr&&<div style={{fontSize:10,color:"#aaa",marginTop:2}}>Last: {fmt(lr.date)}</div>}</div>
                    <div><div className="si-stat-val" style={{color:"var(--amber)"}}>{used}</div><div className="si-stat-lbl">Used</div>{lu&&<div style={{fontSize:10,color:"#aaa",marginTop:2}}>Last: {fmt(lu.date)}</div>}</div>
                    <div><div className="si-stat-val" style={{color:"var(--dark)"}}>{item.stock}</div><div className="si-stat-lbl">On Hand</div></div>
                  </div>
                </div>;
              })}</div>}
            </div>;
          })}
        </>}
      </div>

      {modal&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&closeM()}>
        <div className="modal">
          {modal.type==="receive"&&<>
            <div className="modal-title">📥 Receive Inventory</div>
            <div className="item-pill">
              <strong>{modal.item.name}</strong>
              {modal.item.alt&&<div style={{fontStyle:"italic",color:"var(--grey)",fontSize:12,marginTop:2}}>Also known as: {modal.item.alt}</div>}
              <div className="pill-stock">Supplier: {modal.item.supplier} · Stock: {modal.item.stock} {modal.item.unit}</div>
            </div>
            <div className="field">
              <label>Scan / Upload BOL (optional)</label>
              {!bolFile?<div className="bol-drop" onClick={()=>fileRef.current.click()}><div style={{fontSize:26,marginBottom:4}}>📄</div><div style={{color:"var(--green)",fontWeight:700,fontSize:13}}>Drop BOL scan here</div><div style={{color:"var(--grey)",fontSize:11,marginTop:3}}>Image or PDF — AI extracts items</div><input ref={fileRef} type="file" accept="image/*,.pdf" style={{display:"none"}} onChange={doBOL}/></div>
              :<div className="bol-uploaded"><span>✅</span><div style={{flex:1}}><div style={{fontWeight:600}}>{bolName}</div>{analyzing&&<div style={{color:"var(--amber)",fontSize:12}}>🤖 Analyzing…</div>}</div><button className="btn btn-ghost btn-sm" onClick={()=>{setBolFile(null);setBolName("");setAiRes(null);}}>Remove</button></div>}
              {aiRes&&!aiRes.error&&<div className="ai-result"><div className="ai-title">🤖 BOL Items Extracted</div>{aiRes.bolNumber&&<div style={{fontSize:11,color:"var(--grey)",marginBottom:6}}>BOL #{aiRes.bolNumber}</div>}{aiRes.items?.map((it,i)=><div key={i} className="ai-row"><span>{it.name}</span><span style={{fontWeight:700,color:"var(--green)"}}>{it.qty} {it.unit}</span></div>)}</div>}
              {aiRes?.error&&<div style={{marginTop:8,fontSize:12,color:"var(--red)",padding:"8px 10px",background:"var(--red-bg)",borderRadius:6}}>⚠️ {aiRes.error}</div>}
            </div>
            <div className="field"><label>Quantity Received *</label><input type="number" min="1" placeholder="e.g. 20" value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))}/></div>
            <div className="field"><label>BOL / Reference Note</label><input type="text" placeholder="e.g. BOL #7890" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/></div>
            <div className="field"><label>Received By *</label><input type="text" placeholder="Your name" value={form.user} onChange={e=>setForm(f=>({...f,user:e.target.value}))}/></div>
            <div className="modal-actions"><button className="btn btn-ghost" onClick={closeM}>Cancel</button><button className="btn btn-green" onClick={doRecv} disabled={!form.qty||!form.user||saving}>{saving?"Saving…":"Confirm Receipt"}</button></div>
          </>}
          {modal.type==="use"&&<>
            <div className="modal-title">📤 Record Usage</div>
            <div className="item-pill">
              <strong>{modal.item.name}</strong>
              {modal.item.alt&&<div style={{fontStyle:"italic",color:"var(--grey)",fontSize:12,marginTop:2}}>Also known as: {modal.item.alt}</div>}
              <div className="pill-stock" style={{color:modal.item.stock<=modal.item.threshold?"var(--amber)":"var(--grey)"}}>Stock: {modal.item.stock} {modal.item.unit} · Season used: {sqty(modal.item.id,"used")}</div>
            </div>
            <div className="field"><label>Quantity Used *</label><input type="number" min="1" max={modal.item.stock} placeholder="e.g. 5" value={form.qty} onChange={e=>setForm(f=>({...f,qty:e.target.value}))}/></div>
            <div className="field"><label>Reason / Line</label><input type="text" placeholder="e.g. Line 2 production run" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}/></div>
            <div className="field"><label>Entered By *</label><input type="text" placeholder="Your name" value={form.user} onChange={e=>setForm(f=>({...f,user:e.target.value}))}/></div>
            <div className="modal-actions"><button className="btn btn-ghost" onClick={closeM}>Cancel</button><button className="btn btn-danger" onClick={doUse} disabled={!form.qty||!form.user||saving}>{saving?"Saving…":"Record Usage"}</button></div>
          </>}
          {modal.type==="addItem"&&<>
            <div className="modal-title">➕ Add New Item</div>
            <div className="field"><label>Item Name *</label><input type="text" placeholder="Official name" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
            <div className="field"><label>Alternative Name</label><input type="text" placeholder="What your counter calls it" value={form.alt} onChange={e=>setForm(f=>({...f,alt:e.target.value}))}/></div>
            <div className="field"><label>Supplier</label><select value={form.supplier} onChange={e=>setForm(f=>({...f,supplier:e.target.value}))}>{SUPS.slice(1).map(s=><option key={s}>{s}</option>)}</select></div>
            <div className="field"><label>Category</label><select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{CATS.slice(1).map(c=><option key={c}>{c}</option>)}</select></div>
            <div className="field"><label>Unit</label><input type="text" placeholder="cases, rolls, boxes…" value={form.unit} onChange={e=>setForm(f=>({...f,unit:e.target.value}))}/></div>
            <div className="field"><label>Low Stock Threshold</label><input type="number" min="1" placeholder="e.g. 10" value={form.threshold} onChange={e=>setForm(f=>({...f,threshold:e.target.value}))}/></div>
            <div className="modal-actions"><button className="btn btn-ghost" onClick={closeM}>Cancel</button><button className="btn btn-green" onClick={doAdd} disabled={!form.name||saving}>{saving?"Saving…":"Add Item"}</button></div>
          </>}
          {modal.type==="editThreshold"&&<>
            <div className="modal-title">⚙️ Set Alert Threshold</div>
            <div className="item-pill"><strong>{modal.item.name}</strong><div className="pill-stock">Current: {modal.item.threshold} {modal.item.unit}</div></div>
            <div className="field"><label>New Threshold ({modal.item.unit})</label><input type="number" min="1" placeholder={modal.item.threshold} value={form.threshold} onChange={e=>setForm(f=>({...f,threshold:e.target.value}))}/></div>
            <div style={{fontSize:12,color:"var(--grey)"}}>Alert appears when stock falls to or below this level.</div>
            <div className="modal-actions"><button className="btn btn-ghost" onClick={closeM}>Cancel</button><button className="btn btn-green" onClick={doThresh} disabled={saving}>{saving?"Saving…":"Save"}</button></div>
          </>}
        </div>
      </div>}

      {toast&&<div className={`toast toast-${toast.type}`}>{toast.msg}</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
